# Macena CS2 Analyzer — Cross-Platform CI/CD Pipeline
#
# Stages:  Lint → Test (matrix) → Integration (matrix) → Security → Build
# Runners: Ubuntu (lint, security, type-check) + Matrix (test, integration)
#          Windows-only for distribution build (CS2 targets Windows)
#
# All actions are SHA-pinned for supply chain security.
# Permissions follow least-privilege principle.
name: Macena CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

# Least-privilege: only read access to repo contents.
# Individual jobs override when they need more (e.g. upload-artifact).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: LINT (Ubuntu — fast, ~1 minute)
  # Catches formatting, import order, and code quality issues early.
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks (format + quality)
        env:
          # Skip system hooks that need full project deps — covered by integration stage
          SKIP: integrity-manifest-check,dev-health-quick
        run: pre-commit run --all-files --show-diff-on-failure

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: UNIT TESTS + COVERAGE (Matrix: Ubuntu + Windows, ~3 minutes)
  # Validates logic on both platforms and tracks test coverage.
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      CI: 'true'
      VIRTUAL_ENV: 'ci'
      KIVY_NO_ARGS: '1'  # Transitional: needed while 24 Kivy files remain
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Transitional: SDL2 needed while Kivy code remains (remove after full Qt migration)
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run pytest with coverage
        run: >
          python -m pytest Programma_CS2_RENAN/tests/ tests/
          -v --tb=short
          --cov=Programma_CS2_RENAN
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=33
          -x

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report-${{ runner.os }}
          path: coverage.xml
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: INTEGRATION (Matrix: Ubuntu + Windows, ~5 minutes)
  # Headless validator, cross-module consistency, portability checks.
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    name: Integration (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      CI: 'true'
      VIRTUAL_ENV: 'ci'
      KIVY_NO_ARGS: '1'  # Transitional: needed while 24 Kivy files remain
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Transitional: SDL2 needed while Kivy code remains (remove after full Qt migration)
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run headless validator (24-phase gate)
        run: python tools/headless_validator.py
        timeout-minutes: 2

      - name: Run cross-module consistency checks
        run: |
          python -c "
          from Programma_CS2_RENAN.core.app_types import PlayerRole as canonical
          print('PlayerRole canonical check: PASS')

          from Programma_CS2_RENAN.backend.processing.feature_engineering import METADATA_DIM
          from Programma_CS2_RENAN.backend.nn.config import INPUT_DIM
          assert METADATA_DIM == INPUT_DIM, f'METADATA_DIM ({METADATA_DIM}) != INPUT_DIM ({INPUT_DIM})'
          print(f'METADATA_DIM consistency check: PASS (dim={METADATA_DIM})')
          "

      - name: Run portability tests
        run: python tools/portability_test.py

      - name: Verify integrity manifest
        run: python Programma_CS2_RENAN/tools/sync_integrity_manifest.py --verify-only

      - name: Upload Build Health Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: build-health-report-${{ runner.os }}
          path: Build_Health_Report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4: SECURITY (Ubuntu — parallel with test, ~2 minutes)
  # SAST (Bandit), secrets detection, and dependency CVE audit.
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets pip-audit

      - name: Run Bandit security linter (generate report)
        run: >
          bandit -r Programma_CS2_RENAN/
          --severity-level medium
          --confidence-level medium
          -f json
          -o bandit-report.json
          --exclude Programma_CS2_RENAN/tests,external_analysis
          || test $? -eq 1

      - name: Fail on MEDIUM+ severity Bandit findings
        run: >
          bandit -r Programma_CS2_RENAN/
          --severity-level medium
          --confidence-level medium
          --exclude Programma_CS2_RENAN/tests,external_analysis
          -f screen

      - name: Check for hardcoded secrets (detect-secrets)
        run: |
          detect-secrets scan Programma_CS2_RENAN/ \
            --exclude-files 'tests/' \
            --exclude-files 'external_analysis/' \
            --exclude-files 'integrity_manifest' \
            --exclude-files 'i18n/' \
            > .secrets-report.json
          # Only fail on high-entropy findings (actual hardcoded secrets).
          # KeywordDetector matches variable names (api_key=...) which are false
          # positives in credential-handling code. Bandit B105 covers hardcoded values.
          RESULTS=$(python -c "
          import json, sys
          r = json.load(open('.secrets-report.json'))
          count = 0
          for f, secrets in r.get('results', {}).items():
              real = [s for s in secrets if s['type'] != 'Secret Keyword']
              if real:
                  count += 1
                  print(f'  {f}: {[s[\"type\"] for s in real]}', file=sys.stderr)
          print(count)
          ")
          if [ "$RESULTS" -gt 0 ]; then
            echo "ERROR: detect-secrets found potential hardcoded secrets in $RESULTS file(s)"
            exit 1
          fi

      - name: Audit dependencies for known CVEs (pip-audit)
        run: |
          pip install -r requirements-ci.txt
          pip-audit --strict --desc on 2>&1 | tee pip-audit-report.txt

      - name: Upload security reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.txt
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4b: TYPE CHECK (Ubuntu — informational, non-blocking)
  # ═══════════════════════════════════════════════════════════════════════════
  type-check:
    name: Type Check (informational)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    env:
      CI: 'true'
      VIRTUAL_ENV: 'ci'
      KIVY_NO_ARGS: '1'  # Transitional: needed while 24 Kivy files remain
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Transitional: SDL2 needed while Kivy code remains (remove after full Qt migration)
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install mypy

      - name: Run mypy (informational)
        run: mypy Programma_CS2_RENAN/ --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD DISTRIBUTION (Windows only, main branch, after all gates pass)
  # ═══════════════════════════════════════════════════════════════════════════
  build-distribution:
    name: Build Distribution
    runs-on: windows-latest
    timeout-minutes: 20
    needs: [integration, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies (locked CPU versions for reproducible builds)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock-cpu.txt
          pip install pyinstaller

      - name: Validate critical data files exist
        run: |
          python -c "
          from pathlib import Path
          critical = [
              'Programma_CS2_RENAN/apps/qt_app/app.py',
              'Programma_CS2_RENAN/apps/qt_app/themes',
              'Programma_CS2_RENAN/assets/i18n',
              'Programma_CS2_RENAN/PHOTO_GUI',
              'Programma_CS2_RENAN/data/map_config.json',
              'Programma_CS2_RENAN/core/integrity_manifest.json',
              'Programma_CS2_RENAN/backend/knowledge/tactical_knowledge.json',
              'Programma_CS2_RENAN/data/docs',
              'alembic',
              'packaging/cs2_analyzer_win.spec',
          ]
          missing = [f for f in critical if not Path(f).exists()]
          if missing:
              print('CRITICAL: Missing data files for build:')
              for f in missing:
                  print(f'  - {f}')
              exit(1)
          print(f'All {len(critical)} critical data files verified.')
          "

      - name: Build executable
        run: python -m PyInstaller --noconfirm packaging/cs2_analyzer_win.spec --log-level WARN

      - name: Post-build integrity audit
        run: python tools/audit_binaries.py
        env:
          CI: 'true'
          VIRTUAL_ENV: 'ci'

      - name: Upload distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cs2-analyzer-windows
          path: dist/
          retention-days: 30
          if-no-files-found: warn
