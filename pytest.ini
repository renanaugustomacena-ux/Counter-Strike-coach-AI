[pytest]
# Test discovery
testpaths = tests Programma_CS2_RENAN/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# F9-12: global timeout prevents indefinite hangs (requires pytest-timeout plugin)
# If pytest-timeout is not installed this setting is silently ignored.
# timeout_func_only: time only the test body, NOT fixtures/setup/teardown. A slow
# session-scoped fixture on the slower Windows runner was tripping the timer and
# raising a spurious KeyboardInterrupt during session teardown (tests all passed,
# but the process exited 1). Individual test functions are fast (<60s).
timeout = 60
timeout_func_only = true

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    portability: marks tests related to portability
    known_fail: marks tests as documented known failures pending fix
    flaky: marks tests that are non-deterministic or environment-dependent

# Coverage options (when pytest-cov is installed)
# addopts = --cov=Programma_CS2_RENAN --cov-report=html --cov-report=term

# Ignore paths
norecursedirs =
    .git
    .github
    dist
    build
    *.egg-info
    __pycache__
    .venv
    venv
    D:*
    external_libs
    latest
    reports
    docs
