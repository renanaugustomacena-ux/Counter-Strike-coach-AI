[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    portability: marks tests related to portability

# Coverage options (when pytest-cov is installed)
# addopts = --cov=Programma_CS2_RENAN --cov-report=html --cov-report=term

# Ignore paths
norecursedirs =
    .git
    .github
    dist
    build
    *.egg-info
    __pycache__
    .venv
    venv
    D:*
    external_libs
    latest
    reports
    docs
