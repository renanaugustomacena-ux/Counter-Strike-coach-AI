<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Roboto, Inter, system-ui, sans-serif">
  <rect width="1440" height="900" fill="#14141e"></rect>


  <text x="60" y="50" fill="#d96600" font-size="11" letter-spacing="4" font-weight="700">STATE LIBRARY</text>
  <text x="60" y="80" fill="#dcdcdc" font-size="20" font-weight="700">Loading · Empty · Error states</text>
  <text x="60" y="104" fill="#a0a0b0" font-size="13">SkeletonTable, EmptyState, ToastWidget × 4 severities — real widgets from widgets/skeleton.py + widgets/toast.py</text>


  <g transform="translate(60,140)">
    <text fill="#a0a0b0" font-size="11" letter-spacing="3" font-weight="700">SKELETON TABLE · loading placeholder</text>
    <text y="18" fill="#5a5a8a" font-size="11">widgets/skeleton.py · 120px tall cards · 1200ms pulse animation</text>


    <g transform="translate(0,40)">
      <g>
        <rect width="420" height="120" rx="8" fill="#1a1a2e"></rect>
        <rect x="16" y="16" width="200" height="20" rx="4" fill="#3a3a5a" fill-opacity="0.6"></rect>
        <rect x="16" y="48" width="388" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
        <rect x="16" y="68" width="280" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
      </g>
      <g transform="translate(0,128)">
        <rect width="420" height="120" rx="8" fill="#1a1a2e"></rect>
        <rect x="16" y="16" width="200" height="20" rx="4" fill="#3a3a5a" fill-opacity="0.6"></rect>
        <rect x="16" y="48" width="388" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
        <rect x="16" y="68" width="280" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
      </g>
      <g transform="translate(0,256)">
        <rect width="420" height="120" rx="8" fill="#1a1a2e"></rect>
        <rect x="16" y="16" width="200" height="20" rx="4" fill="#3a3a5a" fill-opacity="0.6"></rect>
        <rect x="16" y="48" width="388" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
        <rect x="16" y="68" width="280" height="14" rx="4" fill="#3a3a5a" fill-opacity="0.4"></rect>
      </g>
    </g>
  </g>


  <g transform="translate(510,140)">
    <text fill="#a0a0b0" font-size="11" letter-spacing="3" font-weight="700">EMPTY STATE · no data</text>
    <text y="18" fill="#5a5a8a" font-size="11">widgets/components/empty_state.py · icon + title + description + CTA</text>

    <g transform="translate(0,40)">
      <rect width="420" height="384" rx="8" fill="#1a1a2e"></rect>

      <text x="210" y="130" text-anchor="middle" fill="#3a3a5a" font-size="64">📭</text>
      <text x="210" y="194" text-anchor="middle" fill="#dcdcdc" font-size="18" font-weight="700">No matches found</text>
      <text x="210" y="222" text-anchor="middle" fill="#a0a0b0" font-size="13">Play some games and they&#39;ll appear here.</text>
      <text x="210" y="244" text-anchor="middle" fill="#a0a0b0" font-size="13">Or analyze pro demos for reference.</text>


      <g transform="translate(130,272)">
        <rect width="160" height="36" rx="4" fill="#d96600"></rect>
        <text x="80" y="23" text-anchor="middle" fill="#14141e" font-size="13" font-weight="700">Select Demo Folder</text>
      </g>

      <text x="210" y="332" text-anchor="middle" fill="#4a9eff" font-size="12">Or read the Getting Started guide →</text>
    </g>
  </g>


  <g transform="translate(960,140)">
    <text fill="#a0a0b0" font-size="11" letter-spacing="3" font-weight="700">TOAST NOTIFICATIONS · 4 severities</text>
    <text y="18" fill="#5a5a8a" font-size="11">widgets/toast.py · 50px tall · auto-dismiss (critical = manual only)</text>


    <g transform="translate(0,40)">

      <g>
        <rect width="420" height="50" rx="6" fill="rgba(30,60,90,0.9)" stroke="#4a9eff"></rect>
        <text x="20" y="30" fill="#4a9eff" font-size="18" font-weight="700">ℹ</text>
        <text x="48" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Info</text>
        <text x="48" y="38" fill="#a0a0b0" font-size="11">Demo analysis complete — check Match History</text>
        <text x="400" y="30" text-anchor="middle" fill="#888888" font-size="14">✕</text>
        <text x="404" y="62" text-anchor="end" fill="#3a3a5a" font-size="9">auto · 5s</text>
      </g>


      <g transform="translate(0,76)">
        <rect width="420" height="50" rx="6" fill="rgba(80,60,10,0.9)" stroke="#ffaa00"></rect>
        <text x="20" y="30" fill="#ffaa00" font-size="18" font-weight="700">⚠</text>
        <text x="48" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Warning</text>
        <text x="48" y="38" fill="#a0a0b0" font-size="11">HLTV rate-limited — retry in 12 minutes</text>
        <text x="400" y="30" text-anchor="middle" fill="#888888" font-size="14">✕</text>
        <text x="404" y="62" text-anchor="end" fill="#3a3a5a" font-size="9">auto · 8s</text>
      </g>


      <g transform="translate(0,152)">
        <rect width="420" height="50" rx="6" fill="rgba(80,20,20,0.9)" stroke="#ff4444"></rect>
        <text x="20" y="30" fill="#ff4444" font-size="18" font-weight="700">✖</text>
        <text x="48" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Error</text>
        <text x="48" y="38" fill="#a0a0b0" font-size="11">Demo rejected — file smaller than 10 MB (DS-12)</text>
        <text x="400" y="30" text-anchor="middle" fill="#888888" font-size="14">✕</text>
        <text x="404" y="62" text-anchor="end" fill="#3a3a5a" font-size="9">auto · 12s</text>
      </g>


      <g transform="translate(0,228)">
        <rect width="420" height="50" rx="6" fill="rgba(100,10,10,0.95)" stroke="#ff0000"></rect>
        <text x="20" y="30" fill="#ff0000" font-size="18" font-weight="700">☠</text>
        <text x="48" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Critical</text>
        <text x="48" y="38" fill="#a0a0b0" font-size="11">Teacher daemon crashed — restarted automatically</text>
        <text x="400" y="30" text-anchor="middle" fill="#888888" font-size="14">✕</text>
        <text x="404" y="62" text-anchor="end" fill="#ff0000" font-size="9">manual dismiss only</text>
      </g>
    </g>


    <g transform="translate(0,312)">
      <rect width="420" height="78" rx="6" fill="#1a1a2e"></rect>
      <text x="16" y="22" fill="#dcdcdc" font-size="12" font-weight="700">ToastContainer</text>
      <text x="16" y="42" fill="#a0a0b0" font-size="11">Top-right · MAX_VISIBLE = 3</text>
      <text x="16" y="58" fill="#a0a0b0" font-size="11">Older toasts auto-removed when a 4th arrives</text>
      <text x="16" y="74" fill="#5a5a8a" font-size="10" font-family="JetBrains Mono, monospace">widgets/toast.py:82 ToastContainer</text>
    </g>
  </g>


  <g transform="translate(60,596)">
    <text fill="#a0a0b0" font-size="11" letter-spacing="3" font-weight="700">PROGRESS INDICATORS · ring + bar variants</text>
  </g>


  <g transform="translate(60,630)">
    <rect width="870" height="240" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="24" fill="#dcdcdc" font-size="13" font-weight="700">ProgressRing · QPainter custom</text>

    <g transform="translate(40,60)">

      <g>
        <circle cx="24" cy="24" r="20" fill="none" stroke="#3a3a5a" stroke-opacity="0.3" stroke-width="6"></circle>
        <circle cx="24" cy="24" r="20" fill="none" stroke="#d96600" stroke-width="6" stroke-linecap="round" stroke-dasharray="31.4 94.2" transform="rotate(-90 24 24) scale(1 -1) translate(0 -48)"></circle>
        <text x="24" y="29" text-anchor="middle" fill="#dcdcdc" font-size="11" font-weight="700">25%</text>
        <text x="24" y="72" text-anchor="middle" fill="#a0a0b0" font-size="11">48 px</text>
      </g>

      <g transform="translate(140,0)">
        <circle cx="32" cy="32" r="28" fill="none" stroke="#3a3a5a" stroke-opacity="0.3" stroke-width="6"></circle>
        <circle cx="32" cy="32" r="28" fill="none" stroke="#d96600" stroke-width="6" stroke-linecap="round" stroke-dasharray="87.97 87.97" transform="rotate(-90 32 32) scale(1 -1) translate(0 -64)"></circle>
        <text x="32" y="37" text-anchor="middle" fill="#dcdcdc" font-size="13" font-weight="700">50%</text>
        <text x="32" y="86" text-anchor="middle" fill="#a0a0b0" font-size="11">64 px (default)</text>
      </g>

      <g transform="translate(300,0)">
        <circle cx="40" cy="40" r="36" fill="none" stroke="#3a3a5a" stroke-opacity="0.3" stroke-width="8"></circle>
        <circle cx="40" cy="40" r="36" fill="none" stroke="#d96600" stroke-width="8" stroke-linecap="round" stroke-dasharray="165.12 61.07" transform="rotate(-90 40 40) scale(1 -1) translate(0 -80)"></circle>
        <text x="40" y="45" text-anchor="middle" fill="#dcdcdc" font-size="15" font-weight="700">73%</text>
        <text x="40" y="102" text-anchor="middle" fill="#a0a0b0" font-size="11">80 px (coach)</text>
      </g>

      <g transform="translate(460,0)">
        <circle cx="64" cy="64" r="58" fill="none" stroke="#3a3a5a" stroke-opacity="0.3" stroke-width="10"></circle>
        <circle cx="64" cy="64" r="58" fill="none" stroke="#4caf50" stroke-width="10" stroke-linecap="round" stroke-dasharray="335.38 29.16" transform="rotate(-90 64 64) scale(1 -1) translate(0 -128)"></circle>
        <text x="64" y="70" text-anchor="middle" fill="#dcdcdc" font-size="22" font-weight="700">92%</text>
        <text x="64" y="150" text-anchor="middle" fill="#a0a0b0" font-size="11">128 px</text>
      </g>


      <g transform="translate(660,0)">
        <text fill="#a0a0b0" font-size="11">Color follows token.accent_primary per theme.</text>
        <text y="20" fill="#a0a0b0" font-size="11">Background arc = border_default @ 30% alpha.</text>
        <text y="40" fill="#a0a0b0" font-size="11">Text = text_primary · size = max(9, side/5).</text>
        <text y="74" fill="#5a5a8a" font-size="10" font-family="JetBrains Mono, monospace">widgets/components/progress_ring.py</text>
      </g>
    </g>
  </g>


  <g transform="translate(950,630)">
    <rect width="430" height="240" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="24" fill="#dcdcdc" font-size="13" font-weight="700">ProgressBar · parsing / training</text>

    <g transform="translate(16,52)">

      <g>
        <text fill="#a0a0b0" font-size="11">0%</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
      </g>

      <g transform="translate(0,30)">
        <text fill="#a0a0b0" font-size="11">parsing demo · 25%</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
        <rect y="6" width="100" height="10" rx="3" fill="#d96600"></rect>
      </g>

      <g transform="translate(0,60)">
        <text fill="#a0a0b0" font-size="11">ingesting · 50%</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
        <rect y="6" width="199" height="10" rx="3" fill="#d96600"></rect>
      </g>

      <g transform="translate(0,90)">
        <text fill="#a0a0b0" font-size="11">epoch 22/25 training · 88%</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
        <rect y="6" width="350" height="10" rx="3" fill="#d96600"></rect>
      </g>

      <g transform="translate(0,120)">
        <text fill="#4caf50" font-size="11">complete · 100%</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
        <rect y="6" width="398" height="10" rx="3" fill="#4caf50"></rect>
      </g>

      <g transform="translate(0,150)">
        <text fill="#a0a0b0" font-size="11">indeterminate (loading demo)</text>
        <rect y="6" width="398" height="10" rx="3" fill="#0f0f2e"></rect>
        <rect x="140" y="6" width="120" height="10" rx="3" fill="rgba(217,102,0,0.7)"></rect>
      </g>
    </g>
  </g>

</svg>
