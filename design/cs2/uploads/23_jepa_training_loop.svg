    <rect width="300" height="220" rx="8" fill="#1a1a1a"></rect>
    <text x="14" y="24" fill="#dcdcdc" font-size="13" font-weight="700">Loss curve · 40 epochs</text>
    <text x="14" y="42" fill="#5a5a8a" font-size="10" font-family="JetBrains Mono, monospace">tensorboard/train_loss</text>


    <g transform="translate(30,62)">

      <line x1="0" y1="0" x2="0" y2="130" stroke="#3a3a5a"></line>

      <line x1="0" y1="130" x2="244" y2="130" stroke="#3a3a5a"></line>


      <line x1="0" y1="32" x2="244" y2="32" stroke="rgba(255,255,255,0.05)"></line>
      <line x1="0" y1="65" x2="244" y2="65" stroke="rgba(255,255,255,0.05)"></line>
      <line x1="0" y1="98" x2="244" y2="98" stroke="rgba(255,255,255,0.05)"></line>


      <text x="-6" y="5" text-anchor="end" fill="#a0a0b0" font-size="9">3.0</text>
