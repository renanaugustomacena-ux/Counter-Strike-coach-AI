      <text x="-6" y="101" text-anchor="end" fill="#a0a0b0" font-size="9">0.5</text>
      <text x="-6" y="133" text-anchor="end" fill="#a0a0b0" font-size="9">0</text>


      <text x="0" y="146" fill="#a0a0b0" font-size="9">0</text>
      <text x="122" y="146" text-anchor="middle" fill="#a0a0b0" font-size="9">20</text>
      <text x="244" y="146" text-anchor="end" fill="#a0a0b0" font-size="9">40</text>


      <polyline points="0,8 12,18 24,35 36,50 48,60 60,72 72,80 84,86 96,92 108,96 120,100 132,104 144,108 156,110 168,112 180,114 192,116 204,118 216,120 228,121 244,122" fill="none" stroke="#00ccff" stroke-width="2"></polyline>

      <polyline points="0,6 12,14 24,28 36,44 48,54 60,64 72,74 84,82 96,86 108,90 120,94 132,98 144,102 156,104 168,106 180,107 192,108 204,109 216,110 228,111 244,112" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 2"></polyline>
    </g>


    <g transform="translate(30,202)" font-size="10">
      <line x1="0" y1="0" x2="14" y2="0" stroke="#00ccff" stroke-width="2"></line>
      <text x="20" y="3" fill="#dcdcdc">train_loss</text>
      <line x1="100" y1="0" x2="114" y2="0" stroke="#ffaa00" stroke-width="2" stroke-dasharray="3 2"></line>
