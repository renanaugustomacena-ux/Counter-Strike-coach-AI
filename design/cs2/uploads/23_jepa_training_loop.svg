  <path d="M210 560 L210 256" stroke="#d96600" stroke-width="1.5" marker-end="url(#ar)"></path>


  <path d="M360 208 L600 410" stroke="#d96600" stroke-width="0.8" stroke-dasharray="3 2" fill="none" opacity="0.4"></path>
  <path d="M1080 208 L840 410" stroke="#d96600" stroke-width="0.8" stroke-dasharray="3 2" fill="none" opacity="0.4"></path>
