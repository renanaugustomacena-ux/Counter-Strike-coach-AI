  </g>


  <g transform="translate(380,304)">
    <rect width="440" height="96" rx="8" fill="#1a1a2e"></rect>
    <text x="14" y="24" fill="#dcdcdc" font-size="13" font-weight="700">Hyperparameters</text>
    <g transform="translate(14,42)" font-size="11" font-family="JetBrains Mono, monospace" fill="#a0a0b0">
      <text>optimizer = AdamW(lr=1e-4, weight_decay=1e-2)</text>
      <text y="16">scheduler = CosineAnnealingLR(T_max=40 epochs)</text>
      <text y="32">ema_momentum = 0.996 (BYOL default)</text>
      <text y="48">batch_size = 64 · T = 20 · GLOBAL_SEED = 42</text>
    </g>
  </g>


  <g transform="translate(840,304)">
    <rect width="220" height="96" rx="8" fill="#1a1a2e"></rect>
    <text x="14" y="24" fill="#dcdcdc" font-size="13" font-weight="700">Epoch schedule</text>
    <g transform="translate(14,42)" font-size="11">
      <text fill="#a0a0b0">Pre-train: 40 epochs</text>
      <text y="16" fill="#a0a0b0">Val every: 1 epoch</text>
      <text y="32" fill="#a0a0b0">Early stop: patience 5</text>
      <text y="48" fill="#a0a0b0">Save every: 100 steps</text>
    </g>
  </g>


  <g transform="translate(60,832)">
    <text fill="#ff4444" font-size="10" letter-spacing="2" font-weight="700">FAILURE MODES HANDLED</text>
    <g transform="translate(0,14)" font-size="11">
      <text fill="#a0a0b0">Embedding collapse (all s → same vector) → fixed by InfoNCE (P1-03) · Target drift → EMA bounds τ=0.996 · Silent grad poisoning → NN-JM-04 assert · Checkpoint non-det → GLOBAL_SEED=42</text>
    </g>
  </g>
