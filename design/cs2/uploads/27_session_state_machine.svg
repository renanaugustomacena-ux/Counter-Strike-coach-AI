<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Roboto, Inter, system-ui, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#d96600"></path></marker>
    <marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#4a9eff"></path></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#4caf50"></path></marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#ff4444"></path></marker>
  </defs>

  <rect width="1440" height="900" fill="#14141e"></rect>

  <g transform="translate(60,44)">
    <text fill="#4a9eff" font-size="10" letter-spacing="4" font-weight="700">CORE · FRAME 27</text>
    <text y="32" fill="#dcdcdc" font-size="24" font-weight="700">Session Engine — 4 daemons + global state machine</text>
    <text y="54" fill="#a0a0b0" font-size="12">core/session_engine.py · threading-based · watchdog every 30s restarts crashed daemons</text>
  </g>


  <g transform="translate(60,140)">
    <text fill="#dcdcdc" font-size="13" font-weight="700">Global lifecycle · CoachState.status (SQLModel singleton, id=1)</text>
  </g>


  <g transform="translate(60,168)">



    <g>
      <rect width="148" height="52" rx="26" fill="rgba(255,170,0,0.15)" stroke="#ffaa00"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#ffaa00" font-size="11" font-weight="700">BOOTING</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">startup path</text>
    </g>
    <path d="M208 194 L236 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(236,0)">
      <rect width="148" height="52" rx="26" fill="rgba(76,175,80,0.15)" stroke="#4caf50"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="700">RUNNING</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">all 4 daemons alive</text>
    </g>
    <path d="M384 194 L412 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(412,0)">
      <rect width="148" height="52" rx="26" fill="rgba(74,158,255,0.15)" stroke="#4a9eff"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">IDLE</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">no demos queued</text>
    </g>
    <path d="M560 194 L588 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(588,0)">
      <rect width="148" height="52" rx="26" fill="rgba(217,102,0,0.18)" stroke="#d96600"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#d96600" font-size="11" font-weight="700">TRAINING</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">Teacher active</text>
    </g>
    <path d="M736 194 L764 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(764,0)">
      <rect width="148" height="52" rx="26" fill="rgba(168,85,247,0.15)" stroke="#a855f7"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="700">PAUSED</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">user paused</text>
    </g>
    <path d="M912 194 L940 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(940,0)">
      <rect width="160" height="52" rx="26" fill="rgba(255,170,0,0.15)" stroke="#ffaa00"></rect>
      <text x="80" y="24" text-anchor="middle" fill="#ffaa00" font-size="11" font-weight="700">SHUTTING_DOWN</text>
      <text x="80" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">shutdown requested</text>
    </g>
    <path d="M1100 194 L1128 194" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


    <g transform="translate(1128,0)">
      <rect width="140" height="52" rx="26" fill="#0f0f2e" stroke="#3a3a5a"></rect>
      <text x="70" y="24" text-anchor="middle" fill="#a0a0b0" font-size="11" font-weight="700">OFFLINE</text>
      <text x="70" y="40" text-anchor="middle" fill="#3a3a5a" font-size="10">clean exit</text>
    </g>


    <g transform="translate(588,76)">
      <rect width="148" height="52" rx="26" fill="rgba(255,68,68,0.15)" stroke="#ff4444"></rect>
      <text x="74" y="24" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="700">ERROR</text>
      <text x="74" y="40" text-anchor="middle" fill="#a0a0b0" font-size="10">daemon crashed</text>
    </g>


