    <text x="444" y="244" fill="#ff4444" font-size="10">any state → ERROR on daemon death</text>

    <path d="M700 218 L720 200" stroke="#4caf50" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arG)"></path>
    <text x="708" y="252" fill="#4caf50" font-size="10">watchdog restarts → back to RUNNING</text>
  </g>


  <g transform="translate(60,316)">
    <text fill="#dcdcdc" font-size="13" font-weight="700">The 4 daemons — independent threads with strict responsibility</text>
  </g>


  <g transform="translate(60,344)">
    <rect width="320" height="232" rx="8" fill="#1a1a2e" stroke="#d96600"></rect>
    <text x="16" y="26" fill="#d96600" font-size="10" letter-spacing="3" font-weight="700">DAEMON A · SCANNER  (Hunter)</text>
    <text x="16" y="50" fill="#dcdcdc" font-size="14" font-weight="700">_scanner_daemon_loop()</text>

    <g transform="translate(16,68)" font-size="11">
      <text fill="#a0a0b0">Responsibility:</text>
      <text y="16" fill="#dcdcdc">scan demo folder → enqueue IngestionTask rows</text>

      <text y="40" fill="#a0a0b0">Interval:</text>
      <text y="56" fill="#dcdcdc" font-family="JetBrains Mono, monospace">SCAN_INTERVAL = 10s</text>

      <text y="78" fill="#a0a0b0">Disk check:</text>
      <text y="94" fill="#dcdcdc" font-family="JetBrains Mono, monospace">DISK_CHECK_INTERVAL = 300s</text>

      <text y="118" fill="#a0a0b0">State reporter:</text>
      <text y="134" fill="#dcdcdc" font-family="JetBrains Mono, monospace">CoachState.hltv_status</text>
    </g>

    <text x="16" y="220" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">session_engine.py:283</text>
  </g>


  <g transform="translate(396,344)">
    <rect width="320" height="232" rx="8" fill="#1a1a2e" stroke="#4caf50"></rect>
    <text x="16" y="26" fill="#4caf50" font-size="10" letter-spacing="3" font-weight="700">DAEMON B · DIGESTER</text>
    <text x="16" y="50" fill="#dcdcdc" font-size="14" font-weight="700">_digester_daemon_loop()</text>

    <g transform="translate(16,68)" font-size="11">
      <text fill="#a0a0b0">Responsibility:</text>
      <text y="16" fill="#dcdcdc">pop queued tasks · parse · vectorize · write DB</text>

      <text y="40" fill="#a0a0b0">Zombie guard:</text>
      <text y="56" fill="#dcdcdc" font-family="JetBrains Mono, monospace">ZOMBIE_THRESHOLD = 1800s</text>

      <text y="78" fill="#a0a0b0">Progress signal:</text>
      <text y="94" fill="#dcdcdc" font-family="JetBrains Mono, monospace">CoachState.parsing_progress</text>

      <text y="118" fill="#a0a0b0">State reporter:</text>
      <text y="134" fill="#dcdcdc" font-family="JetBrains Mono, monospace">CoachState.ingest_status</text>
    </g>

    <text x="16" y="220" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">session_engine.py:374</text>
  </g>


  <g transform="translate(732,344)">
    <rect width="320" height="232" rx="8" fill="#1a1a2e" stroke="#4a9eff"></rect>
    <text x="16" y="26" fill="#4a9eff" font-size="10" letter-spacing="3" font-weight="700">DAEMON C · TEACHER</text>
    <text x="16" y="50" fill="#dcdcdc" font-size="14" font-weight="700">_teacher_daemon_loop()</text>

    <g transform="translate(16,68)" font-size="11">
      <text fill="#a0a0b0">Responsibility:</text>
      <text y="16" fill="#dcdcdc">run training loop (JEPA + LSTM) periodically</text>

      <text y="40" fill="#a0a0b0">Emits metrics:</text>
      <text y="56" fill="#dcdcdc" font-family="JetBrains Mono, monospace">current_epoch · train_loss · val_loss</text>

      <text y="78" fill="#a0a0b0">Gate:</text>
      <text y="94" fill="#dcdcdc">min samples before train (configurable)</text>

      <text y="118" fill="#a0a0b0">State reporter:</text>
      <text y="134" fill="#dcdcdc" font-family="JetBrains Mono, monospace">CoachState.ml_status</text>
    </g>

    <text x="16" y="220" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">session_engine.py:418</text>
  </g>


  <g transform="translate(1068,344)">
    <rect width="320" height="232" rx="8" fill="#1a1a2e" stroke="#a855f7"></rect>
    <text x="16" y="26" fill="#a855f7" font-size="10" letter-spacing="3" font-weight="700">DAEMON D · PULSE</text>
    <text x="16" y="50" fill="#dcdcdc" font-size="14" font-weight="700">_pulse_daemon_loop()</text>

    <g transform="translate(16,68)" font-size="11">
      <text fill="#a0a0b0">Responsibility:</text>
      <text y="16" fill="#dcdcdc">heartbeat · CPU/mem telemetry · keep-alive</text>

      <text y="40" fill="#a0a0b0">Heartbeat interval:</text>
      <text y="56" fill="#dcdcdc" font-family="JetBrains Mono, monospace">periodic · updates last_heartbeat</text>

      <text y="78" fill="#a0a0b0">Publishes to:</text>
      <text y="94" fill="#dcdcdc" font-family="JetBrains Mono, monospace">CoachState.system_load_cpu/mem</text>

      <text y="118" fill="#a0a0b0">Purpose:</text>
      <text y="134" fill="#dcdcdc">lets UI know engine is alive</text>
    </g>

    <text x="16" y="220" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">session_engine.py · pulse loop</text>
  </g>


  <g transform="translate(60,600)">
    <rect width="1328" height="96" rx="8" fill="rgba(74,158,255,0.08)" stroke="#4a9eff" stroke-dasharray="5 3"></rect>
    <text x="16" y="26" fill="#4a9eff" font-size="11" letter-spacing="3" font-weight="700">SE-WD · WATCHDOG  (main thread loop, every 30s)</text>

    <g transform="translate(16,48)" font-size="12">
      <text fill="#a0a0b0">1.  For each of (Scanner, Digester, Teacher, Pulse):</text>
      <text y="18" fill="#dcdcdc">      if <tspan font-family="JetBrains Mono, monospace" fill="#ffaa00">not thread.is_alive()</tspan> and not shutdown → spawn new thread with same target, notify UI via ERROR toast</text>
      <text y="40" fill="#a0a0b0">2.  Keeps the system self-healing — a single daemon crash never brings the whole engine down.</text>
    </g>
  </g>


  <g transform="translate(60,712)">
    <rect width="650" height="160" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="24" fill="#dcdcdc" font-size="12" font-weight="700">Auxiliary threads (spawned at boot)</text>

    <g transform="translate(16,48)" font-size="11">
      <g>
        <rect width="8" height="8" rx="2" fill="#d96600"></rect>
        <text x="20" y="8" fill="#dcdcdc" font-weight="700">IPC Stdin Monitor</text>
        <text y="24" fill="#a0a0b0">listens for control messages (pause/resume/shutdown) from GUI process</text>
      </g>
      <g transform="translate(0,44)">
        <rect width="8" height="8" rx="2" fill="#4caf50"></rect>
        <text x="20" y="8" fill="#dcdcdc" font-weight="700">IngestionWatcher (filesystem)</text>
        <text y="24" fill="#a0a0b0">detects new .dem files in real time (watchdog observer pattern)</text>
      </g>
      <g transform="translate(0,88)">
        <rect width="8" height="8" rx="2" fill="#4a9eff"></rect>
        <text x="20" y="8" fill="#dcdcdc" font-weight="700">Auto Backup Manager</text>
        <text y="24" fill="#a0a0b0">sqlite3.backup() → timestamped snapshot if should_run_auto_backup()</text>
      </g>
    </g>
  </g>


  <g transform="translate(726,712)">
    <rect width="662" height="160" rx="8" fill="rgba(217,102,0,0.05)" stroke="#d96600" stroke-dasharray="5 3"></rect>
    <text x="16" y="24" fill="#d96600" font-size="11" letter-spacing="3" font-weight="700">COACHSTATE · SINGLETON · P2-01</text>
    <text x="16" y="44" fill="#a0a0b0" font-size="11">Exactly one row with id=1 (CHECK constraint). Written by daemons, polled by Qt UI.</text>

    <g transform="translate(16,64)" font-family="JetBrains Mono, monospace" font-size="10" fill="#a0a0b0">
      <text>status · belief_confidence · hltv_status (Hunter)</text>
      <text y="14">ingest_status (Digester) · ml_status (Teacher)</text>
      <text y="28">current_epoch · total_epochs · train_loss · val_loss · eta_seconds</text>
      <text y="42">service_pid · system_load_cpu · system_load_mem · last_heartbeat</text>
      <text y="56">parsing_progress · detail</text>
      <text y="74" fill="#ff4444">db_models.py:365  CoachState  CheckConstraint(&#34;id = 1&#34;)</text>
    </g>
  </g>
