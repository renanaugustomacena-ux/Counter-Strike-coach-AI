<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, &#39;Segoe UI&#39;, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg04" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14141e"></stop>
      <stop offset="100%" stop-color="#1a1a2e"></stop>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg04)"></rect>


  <g stroke="rgba(217,102,0,0.3)" stroke-width="1" fill="none">
    <path d="M40 40 L40 80 M40 40 L80 40"></path>
    <path d="M1400 40 L1400 80 M1400 40 L1360 40"></path>
    <path d="M40 860 L40 820 M40 860 L80 860"></path>
    <path d="M1400 860 L1400 820 M1400 860 L1360 860"></path>
  </g>


  <text x="720" y="58" fill="#3a3a5a" font-size="10" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, monospace" letter-spacing="2">WHY · WHAT · HOW</text>


  <g transform="translate(80 120)">
    <text fill="#d96600" font-size="13" font-weight="700" letter-spacing="3">THE ONE-LINER</text>
    <text y="58" fill="#dcdcdc" font-size="48" font-weight="800" letter-spacing="-1">A CS2 coach that runs</text>
    <text y="110" fill="#dcdcdc" font-size="48" font-weight="800" letter-spacing="-1">on your machine and</text>
    <text y="162" fill="#d96600" font-size="48" font-weight="800" letter-spacing="-1">improves itself.</text>

    <text y="214" fill="#a0a0b0" font-size="16" font-weight="300">No cloud. No subscriptions. No &#34;your data is training data&#34;.</text>
    <text y="238" fill="#a0a0b0" font-size="16" font-weight="300">Just a PySide6 desktop app plus a 7-layer neural architecture</text>
    <text y="262" fill="#a0a0b0" font-size="16" font-weight="300">that corrects its own blind spots via gradient feedback.</text>


    <g transform="translate(0 310)">
      <text fill="#3a3a5a" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace" letter-spacing="1.5">WHY IT&#39;S DIFFERENT</text>


      <g transform="translate(0 22)">
        <rect width="560" height="80" rx="8" fill="rgba(0,0,0,0.2)" stroke="#3a3a5a"></rect>
        <rect width="4" height="80" rx="2" fill="#d96600"></rect>
        <text x="22" y="26" fill="#d96600" font-size="10" font-weight="700" font-family="&#39;JetBrains Mono&#39;, monospace">01 · LOCAL-FIRST</text>
        <text x="22" y="48" fill="#dcdcdc" font-size="15" font-weight="700">Nothing leaves your disk.</text>
        <text x="22" y="68" fill="#a0a0b0" font-size="12">SQLite-WAL · Alembic migrations · demos parsed on-device.</text>
      </g>

      <g transform="translate(0 112)">
        <rect width="560" height="80" rx="8" fill="rgba(0,0,0,0.2)" stroke="#3a3a5a"></rect>
        <rect width="4" height="80" rx="2" fill="#ff4444"></rect>
        <text x="22" y="26" fill="#ff4444" font-size="10" font-weight="700" font-family="&#39;JetBrains Mono&#39;, monospace">02 · SELF-CORRECTING</text>
        <text x="22" y="48" fill="#dcdcdc" font-size="15" font-weight="700">Critic gap drives every gradient.</text>
        <text x="22" y="68" fill="#a0a0b0" font-size="12">ΔA = Actual − V̂(s) · Hopfield prototypes reshape · MoE specialization.</text>
      </g>

      <g transform="translate(0 202)">
        <rect width="560" height="80" rx="8" fill="rgba(0,0,0,0.2)" stroke="#3a3a5a"></rect>
        <rect width="4" height="80" rx="2" fill="#4db04f"></rect>
        <text x="22" y="26" fill="#4db04f" font-size="10" font-weight="700" font-family="&#39;JetBrains Mono&#39;, monospace">03 · REPRODUCIBLE</text>
        <text x="22" y="48" fill="#dcdcdc" font-size="15" font-weight="700">GLOBAL_SEED = 42 · audit-driven.</text>
        <text x="22" y="68" fill="#a0a0b0" font-size="12">Every invariant (P-RSB-03, NN-MEM-01, DS-12) is codified + tested.</text>
      </g>
    </g>
  </g>


  <g transform="translate(720 120)">

    <g>
      <text fill="#d96600" font-size="13" font-weight="700" letter-spacing="3">THE NUMBERS</text>


      <g transform="translate(0 20)">
        <rect width="640" height="180" rx="12" fill="#0f0f2e" stroke="#d96600" stroke-width="1.5"></rect>
        <text x="24" y="30" fill="#a0a0b0" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace" letter-spacing="1.5">ACTIVE CS2 PLAYER BASE</text>
        <text x="24" y="108" fill="#dcdcdc" font-size="96" font-weight="800" letter-spacing="-3">1.4M</text>
        <text x="24" y="138" fill="#a0a0b0" font-size="13">peak concurrent on Steam (24h) · all demo-capable.</text>
        <text x="24" y="166" fill="#3a3a5a" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace">source: steamdb · 2026 Q2 snapshot</text>


        <g transform="translate(420 36)">
          <rect width="200" height="120" fill="#0a0a14" stroke="#3a3a5a"></rect>
          <polyline points="8,96 28,88 48,90 68,76 88,80 108,64 128,72 148,56 168,48 188,40" fill="none" stroke="#00ccff" stroke-width="1.6"></polyline>
          <circle cx="188" cy="40" r="3" fill="#00ccff"></circle>
          <text x="188" y="32" fill="#00ccff" font-size="10" text-anchor="end" font-family="&#39;JetBrains Mono&#39;, monospace">peak</text>
        </g>
      </g>
    </g>


    <g transform="translate(0 220)">
      <g transform="translate(0 0)">
        <rect width="150" height="130" rx="10" fill="#0f0f2e" stroke="#3a3a5a"></rect>
        <text x="75" y="38" fill="#d96600" font-size="36" font-weight="800" text-anchor="middle">25</text>
        <text x="75" y="58" fill="#a0a0b0" font-size="10" text-anchor="middle">FEATURE DIMS</text>
        <text x="75" y="96" fill="#dcdcdc" font-size="11" text-anchor="middle">hand-audited</text>
        <text x="75" y="110" fill="#3a3a5a" font-size="9" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, monospace">P-RSB-03</text>
      </g>

      <g transform="translate(164 0)">
        <rect width="150" height="130" rx="10" fill="#0f0f2e" stroke="#3a3a5a"></rect>
        <text x="75" y="38" fill="#d96600" font-size="36" font-weight="800" text-anchor="middle">512</text>
        <text x="75" y="58" fill="#a0a0b0" font-size="10" text-anchor="middle">LTC NEURONS</text>
        <text x="75" y="96" fill="#dcdcdc" font-size="11" text-anchor="middle">motor · cmd · inter</text>
        <text x="75" y="110" fill="#3a3a5a" font-size="9" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, monospace">AutoNCP</text>
      </g>

      <g transform="translate(328 0)">
        <rect width="150" height="130" rx="10" fill="#0f0f2e" stroke="#3a3a5a"></rect>
        <text x="75" y="38" fill="#d96600" font-size="36" font-weight="800" text-anchor="middle">32</text>
        <text x="75" y="58" fill="#a0a0b0" font-size="10" text-anchor="middle">PROTOTYPES</text>
        <text x="75" y="96" fill="#dcdcdc" font-size="11" text-anchor="middle">learnable Hopfield</text>
        <text x="75" y="110" fill="#3a3a5a" font-size="9" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, monospace">RAP-AUDIT-03</text>
      </g>

      <g transform="translate(492 0)">
        <rect width="148" height="130" rx="10" fill="#0f0f2e" stroke="#3a3a5a"></rect>
        <text x="74" y="38" fill="#d96600" font-size="36" font-weight="800" text-anchor="middle">0.70</text>
        <text x="74" y="58" fill="#a0a0b0" font-size="10" text-anchor="middle">CONF FLOOR</text>
        <text x="74" y="96" fill="#dcdcdc" font-size="11" text-anchor="middle">silent if unsure</text>
        <text x="74" y="110" fill="#3a3a5a" font-size="9" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, monospace">humility gate</text>
      </g>
    </g>


    <g transform="translate(0 370)">
      <text fill="#3a3a5a" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace" letter-spacing="1.5">STACK</text>

      <g transform="translate(0 20)" font-family="&#39;JetBrains Mono&#39;, monospace" font-size="11">
        <rect width="640" height="100" rx="8" fill="rgba(0,0,0,0.2)" stroke="#3a3a5a"></rect>
        <g transform="translate(20 26)">
          <text fill="#a0a0b0">UI</text>
          <text x="80" fill="#dcdcdc">PySide6 · Qt 6.7 · QPainter · QCharts</text>
          <text y="20" fill="#a0a0b0">ML</text>
          <text x="80" y="20" fill="#dcdcdc">PyTorch · ncps (LTC) · hflayers (Hopfield)</text>
          <text y="40" fill="#a0a0b0">DATA</text>
          <text x="80" y="40" fill="#dcdcdc">demoparser2 · SQLite-WAL · Alembic · BS4+FlareSolverr</text>
          <text y="60" fill="#a0a0b0">TOOLS</text>
          <text x="80" y="60" fill="#dcdcdc">ruff · mypy · pytest · black · pre-commit</text>
        </g>
      </g>
    </g>
  </g>


  <g transform="translate(80 810)">
    <rect width="1280" height="56" rx="10" fill="rgba(217,102,0,0.08)" stroke="#d96600" stroke-width="0.8"></rect>
    <text x="24" y="28" fill="#d96600" font-size="11" font-weight="700" letter-spacing="2" font-family="&#39;JetBrains Mono&#39;, monospace">THE ASK</text>
    <text x="24" y="46" fill="#dcdcdc" font-size="13" font-weight="500">Seeking early testers · pro-team partnerships · infrastructure sponsors. Contact: <tspan fill="#d96600">ciupsciups@libero.it</tspan></text>
  </g>
</svg>
