<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Roboto, Inter, system-ui, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#d96600"></path></marker>
    <marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#4a9eff"></path></marker>
    <marker id="arY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#ffaa00"></path></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#4caf50"></path></marker>
  </defs>

  <rect width="1440" height="900" fill="#14141e"></rect>

  <g transform="translate(60,44)">
    <text fill="#4a9eff" font-size="10" letter-spacing="4" font-weight="700">AI CORE · FRAME 22</text>
    <text y="32" fill="#dcdcdc" font-size="24" font-weight="700">JEPA Coaching Model — joint-embedding predictive architecture</text>
    <text y="54" fill="#a0a0b0" font-size="12">LeCun 2023 · predict latent space, not observation space · backend/nn/jepa_model.py</text>
  </g>


  <g transform="translate(600,100)">
    <rect width="240" height="78" rx="8" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"></rect>
    <text x="12" y="20" fill="#d96600" font-size="10" letter-spacing="2" font-weight="700">INPUT · match state</text>
    <text x="12" y="42" fill="#dcdcdc" font-size="14" font-weight="700">x ∈ ℝ [B=64, T=20, 25]</text>
    <text x="12" y="60" fill="#a0a0b0" font-size="11">B=batch · T=ctx(10)+tgt(10) · 25=METADATA_DIM</text>
    <text x="12" y="74" fill="#3a3a5a" font-size="9" font-family="JetBrains Mono, monospace">P-X-02 · x.shape[-1] == 25</text>
  </g>


  <path d="M640 180 L320 220" stroke="#d96600" stroke-width="1.5" marker-end="url(#ar)"></path>
  <path d="M800 180 L1120 220" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>
  <text x="440" y="194" fill="#d96600" font-size="11">x_ctx = x[:, 0:10, :]</text>
  <text x="920" y="194" fill="#4a9eff" font-size="11">x_tgt = x[:, 10:20, :]</text>


  <g transform="translate(60,224)">
    <rect width="300" height="180" rx="8" fill="rgba(217,102,0,0.08)" stroke="#d96600" stroke-width="2"></rect>
    <text x="14" y="22" fill="#d96600" font-size="10" letter-spacing="2" font-weight="700">CONTEXT ENCODER θ · trainable</text>
    <text x="14" y="44" fill="#dcdcdc" font-size="13" font-weight="700">JEPAEncoder(25)</text>
    <g transform="translate(14,56)" font-size="11" font-family="JetBrains Mono, monospace" fill="#a0a0b0">
      <text y="14">Linear(25 → 512)</text>
      <text y="30">LayerNorm(512)</text>
      <text y="46">GELU()</text>
      <text y="62">Dropout(0.1)</text>
      <text y="78">Linear(512 → 256)</text>
      <text y="94">LayerNorm(256)</text>
    </g>
    <text x="286" y="170" text-anchor="end" fill="#3a3a5a" font-size="9" font-family="JetBrains Mono, monospace">jepa_model.py:43</text>
  </g>


  <g transform="translate(1080,224)">
    <rect width="300" height="180" rx="8" fill="rgba(74,158,255,0.08)" stroke="#4a9eff" stroke-width="2"></rect>
    <text x="14" y="22" fill="#4a9eff" font-size="10" letter-spacing="2" font-weight="700">TARGET ENCODER θ̄ · EMA · no_grad</text>
    <text x="14" y="44" fill="#dcdcdc" font-size="13" font-weight="700">JEPAEncoder(25)</text>
    <g transform="translate(14,56)" font-size="11" font-family="JetBrains Mono, monospace" fill="#a0a0b0">
      <text y="14">Linear(25 → 512)</text>
      <text y="30">LayerNorm(512)</text>
      <text y="46">GELU()</text>
      <text y="62">Dropout(0.1)</text>
      <text y="78">Linear(512 → 256)</text>
      <text y="94">LayerNorm(256)</text>
    </g>
    <text x="286" y="170" text-anchor="end" fill="#3a3a5a" font-size="9" font-family="JetBrains Mono, monospace">requires_grad=False</text>
  </g>


  <path d="M360 280 Q720 240 1080 280" stroke="#ffaa00" stroke-width="1.5" stroke-dasharray="6 3" fill="none"></path>
  <g transform="translate(656,228)">
    <rect width="128" height="42" rx="6" fill="#0f0f2e" stroke="#ffaa00"></rect>
    <text x="64" y="18" text-anchor="middle" fill="#ffaa00" font-size="11" font-weight="700">EMA update</text>
    <text x="64" y="34" text-anchor="middle" fill="#ffaa00" font-size="10" font-family="JetBrains Mono, monospace">τ=0.996</text>
  </g>


  <g transform="translate(60,426)">
    <rect width="300" height="48" rx="6" fill="#1a1a2e" stroke="#d96600"></rect>
    <text x="14" y="20" fill="#d96600" font-size="10" font-weight="700" letter-spacing="2">AVG POOL over seq</text>
    <text x="14" y="38" fill="#dcdcdc" font-size="12" font-family="JetBrains Mono, monospace">s_ctx_pooled ∈ ℝ [B, 256]</text>
  </g>
  <path d="M210 404 L210 426" stroke="#d96600" stroke-width="1.5" marker-end="url(#ar)"></path>

  <g transform="translate(1080,426)">
    <rect width="300" height="48" rx="6" fill="#1a1a2e" stroke="#4a9eff"></rect>
    <text x="14" y="20" fill="#4a9eff" font-size="10" font-weight="700" letter-spacing="2">AVG POOL over seq · stop_grad</text>
    <text x="14" y="38" fill="#dcdcdc" font-size="12" font-family="JetBrains Mono, monospace">s_tgt_pooled ∈ ℝ [B, 256]</text>
  </g>
  <path d="M1230 404 L1230 426" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arB)"></path>


  <g transform="translate(60,496)">
    <rect width="300" height="130" rx="8" fill="rgba(217,102,0,0.06)" stroke="#d96600" stroke-width="1.5"></rect>
    <text x="14" y="22" fill="#d96600" font-size="10" letter-spacing="2" font-weight="700">PREDICTOR · trainable</text>
    <text x="14" y="42" fill="#dcdcdc" font-size="13" font-weight="700">JEPAPredictor(256)</text>
    <g transform="translate(14,52)" font-size="11" font-family="JetBrains Mono, monospace" fill="#a0a0b0">
      <text y="14">Linear(256 → 512)</text>
      <text y="30">LayerNorm(512)</text>
      <text y="46">GELU()</text>
      <text y="62">Dropout(0.1)</text>
      <text y="78">Linear(512 → 256)</text>
    </g>
  </g>
  <path d="M210 474 L210 496" stroke="#d96600" stroke-width="1.5" marker-end="url(#ar)"></path>

  <g transform="translate(60,646)">
    <rect width="300" height="42" rx="6" fill="#1a1a2e" stroke="#d96600"></rect>
    <text x="14" y="18" fill="#d96600" font-size="10" font-weight="700" letter-spacing="2">PREDICTED EMBEDDING</text>
    <text x="14" y="34" fill="#dcdcdc" font-size="12" font-family="JetBrains Mono, monospace">s_pred ∈ ℝ [B, 256]</text>
  </g>
  <path d="M210 626 L210 646" stroke="#d96600" stroke-width="1.5" marker-end="url(#ar)"></path>


  <path d="M360 668 L600 668" stroke="#ffaa00" stroke-width="1.5" fill="none"></path>
  <path d="M1080 668 L840 668" stroke="#ffaa00" stroke-width="1.5" fill="none"></path>
  <g transform="translate(600,640)">
    <rect width="240" height="80" rx="8" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="2"></rect>
    <text x="12" y="20" fill="#ffaa00" font-size="10" letter-spacing="2" font-weight="700">INFONCE LOSS · P1-03</text>
    <text x="12" y="42" fill="#dcdcdc" font-size="13" font-weight="700">jepa_contrastive_loss()</text>
    <text x="12" y="60" fill="#a0a0b0" font-size="11">cosine sim · temperature=0.07</text>
    <text x="12" y="74" fill="#a0a0b0" font-size="11">negatives = batch minus positive</text>
  </g>


  <g transform="translate(400,224)">
    <rect width="640" height="280" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="28" fill="#dcdcdc" font-size="14" font-weight="700">Core training loop</text>

    <g transform="translate(16,56)" font-family="JetBrains Mono, monospace" font-size="12" fill="#dcdcdc">
      <text>s_ctx = context_encoder(x_ctx)</text>
      <text y="22" fill="#a0a0b0"># shape [B, 10, 256] · trainable</text>

      <text y="52">with torch.no_grad():</text>
      <text y="74">    s_tgt = target_encoder(x_tgt)</text>
      <text y="94" fill="#a0a0b0"># shape [B, 10, 256] · EMA-only</text>

      <text y="124">s_ctx_pooled = s_ctx.mean(dim=1)</text>
      <text y="144">s_tgt_pooled = s_tgt.mean(dim=1)</text>
      <text y="166">s_pred = predictor(s_ctx_pooled)</text>

      <text y="196" fill="#ffaa00">loss = infonce(s_pred, s_tgt_pooled, temperature=0.07)</text>
      <text y="216" fill="#a0a0b0"># positive: (s_pred_i, s_tgt_i), negatives: other batch items</text>
    </g>

    <g transform="translate(16,254)" font-size="11">
      <text fill="#5a5a8a" font-family="JetBrains Mono, monospace">jepa_model.py:165 forward_jepa_pretrain()  ·  :373 jepa_contrastive_loss()</text>
    </g>
  </g>


  <g transform="translate(400,524)">
    <rect width="640" height="104" rx="8" fill="#1a1a2e" stroke="#ffaa00" stroke-dasharray="4 3"></rect>
    <text x="16" y="28" fill="#ffaa00" font-size="14" font-weight="700">EMA update — after every optimizer.step()</text>

    <g transform="translate(16,50)" font-family="JetBrains Mono, monospace" font-size="13" fill="#dcdcdc">
      <text>θ̄  ←  τ · θ̄  +  (1 − τ) · θ      τ = 0.996</text>
      <text y="24" fill="#a0a0b0" font-size="11">NN-16: apply_shadow() must .clone() shadows (else parameter aliasing)</text>
      <text y="42" fill="#a0a0b0" font-size="11">NN-JM-04: target_encoder.requires_grad == False asserted in update_target_encoder()</text>
    </g>
  </g>


  <g transform="translate(400,740)">
    <rect width="640" height="120" rx="8" fill="#0f0f2e"></rect>
    <text x="16" y="24" fill="#ff4444" font-size="11" letter-spacing="2" font-weight="700">MODEL-LEVEL INVARIANTS</text>

    <g transform="translate(16,44)" font-size="11" font-family="JetBrains Mono, monospace">
      <text fill="#ff4444" font-weight="700">NN-JM-04</text>
      <text x="80" fill="#a0a0b0">requires_grad=False on target encoder during EMA (jepa_model.py:357)</text>
      <text y="18" fill="#ff4444" font-weight="700">NN-16</text>
      <text y="18" x="80" fill="#a0a0b0">apply_shadow() .clone() — prevents silent parameter aliasing</text>
      <text y="36" fill="#ff4444" font-weight="700">P1-03</text>
      <text y="36" x="80" fill="#a0a0b0">InfoNCE temperature 0.07 — fixes embedding collapse vs plain L2</text>
      <text y="54" fill="#ff4444" font-weight="700">P-X-02</text>
      <text y="54" x="80" fill="#a0a0b0">input shape assertion metadata.shape[-1] == 25</text>
    </g>
  </g>


  <g transform="translate(60,740)">
    <rect width="320" height="120" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="24" fill="#dcdcdc" font-size="12" font-weight="700">Why predict in latent space?</text>
    <text x="16" y="48" fill="#a0a0b0" font-size="11">Predicting raw pixels / raw observations forces</text>
    <text x="16" y="64" fill="#a0a0b0" font-size="11">the model to waste capacity on noise irrelevant</text>
    <text x="16" y="80" fill="#a0a0b0" font-size="11">to decisions (textures, skin colors, exact pos).</text>
    <text x="16" y="102" fill="#d96600" font-size="11" font-weight="700">Latent space = learned compression of signal.</text>
  </g>

  <g transform="translate(1060,740)">
    <rect width="320" height="120" rx="8" fill="#1a1a2e"></rect>
    <text x="16" y="24" fill="#dcdcdc" font-size="12" font-weight="700">After pre-training</text>
    <text x="16" y="48" fill="#a0a0b0" font-size="11">1. freeze_encoders() · requires_grad=False</text>
    <text x="16" y="64" fill="#a0a0b0" font-size="11">2. LSTM(256→128) + MoE(3 experts) heads</text>
    <text x="16" y="80" fill="#a0a0b0" font-size="11">3. Fine-tune on user demos (supervised)</text>
    <text x="16" y="102" fill="#4a9eff" font-size="11" font-weight="700">→ see frame 30 (Inference path)</text>
  </g>
</svg>
