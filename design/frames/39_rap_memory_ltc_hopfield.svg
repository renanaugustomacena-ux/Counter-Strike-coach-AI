    </g>
    <text x="16" y="90" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace">During bypass: zeros_like(ltc_out) → pure LTC (safe fallback)</text>
    <text x="16" y="108" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace">memory.py:141 · combined_state = ltc_out + mem_out</text>
