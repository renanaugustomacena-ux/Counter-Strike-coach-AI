                fill="none" stroke="#d96600" stroke-width="2"/>
      <circle cx="0"   cy="14" r="3" fill="#ff9900"/>
      <circle cx="39"  cy="21" r="3" fill="#f54236"/>
      <circle cx="77"  cy="17" r="3" fill="#ff9900"/>
      <circle cx="116" cy="9"  r="3" fill="#ff9900"/>
      <circle cx="154" cy="11" r="3" fill="#ff9900"/>
