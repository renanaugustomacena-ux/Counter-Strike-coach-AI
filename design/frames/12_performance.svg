      <!-- y_pix = 12 + (1.0 - v) * 36  → 0.94→14.2, 0.74→21.4, 0.87→16.7, 1.08→9.1, 1.04→10.6, 1.22→4, 1.12→7.7, 1.34→-0.2 -->
