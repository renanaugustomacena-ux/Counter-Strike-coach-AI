<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Roboto, Inter, system-ui, sans-serif">
  <defs>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M12 3 L22 12 L19 12 L19 21 L5 21 L5 12 L2 12 Z M9 15 L15 15 L15 21 L9 21 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></symbol>
    <symbol id="ic-brain" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 5 L12 19 M12 8 C7 6 5 11 12 12 M12 12 C17 11 19 16 12 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-list" viewBox="0 0 24 24"><path d="M4 6 L20 6 M4 12 L20 12 M4 18 L20 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="2.5" cy="6" r="1.5" fill="currentColor"/><circle cx="2.5" cy="12" r="1.5" fill="currentColor"/><circle cx="2.5" cy="18" r="1.5" fill="currentColor"/></symbol>
    <symbol id="ic-chart" viewBox="0 0 24 24"><rect x="3" y="14" width="5" height="8" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="8" width="5" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="17" y="3" width="5" height="19" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
    <symbol id="ic-cross" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 1 L12 7 M12 17 L12 23 M1 12 L7 12 M17 12 L23 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 4 L12 7 M12 17 L12 20 M4 12 L7 12 M17 12 L20 12 M6.3 6.3 L8.5 8.5 M15.5 15.5 L17.7 17.7 M6.3 17.7 L8.5 15.5 M15.5 8.5 L17.7 6.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 9 C9 5 15 5 15 9 C15 12 12 12 12 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="18" r="1" fill="currentColor"/></symbol>
  </defs>

  <rect width="1440" height="900" fill="#14141e"/>

  <!-- Sidebar (Home/root is active since Profile lives under Home → Connectivity → Profile) -->
  <g>
    <rect width="220" height="900" fill="#0f0f2e"/>
    <rect x="219" width="1" height="900" fill="rgba(255,255,255,0.05)"/>
    <g transform="translate(176,12)"><text x="18" y="26" text-anchor="middle" fill="#a0a0b0" font-size="22">≡</text></g>
    <text x="110" y="82" text-anchor="middle" fill="#d96600" font-size="11" letter-spacing="3" font-weight="700">MACENA CS2</text>
    <g transform="translate(8,108)" font-size="13">
      <g color="#d96600">
        <rect width="204" height="40" rx="6" fill="rgba(217,102,0,0.25)"/><rect width="3" height="40" fill="#d96600"/>
        <g transform="translate(12,10)"><use href="#ic-home" width="20" height="20"/></g>
        <text x="44" y="26" fill="#d96600" font-weight="600">Home</text>
      </g>
      <g transform="translate(0,44)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-brain" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Coach</text></g>
      <g transform="translate(0,88)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-list" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Match History</text></g>
      <g transform="translate(0,132)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-chart" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Performance</text></g>
      <g transform="translate(0,176)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-cross" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Tactical Viewer</text></g>
      <g transform="translate(0,220)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-gear" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Settings</text></g>
      <g transform="translate(0,264)" color="#a0a0b0"><g transform="translate(12,10)"><use href="#ic-help" width="20" height="20"/></g><text x="44" y="26" fill="#a0a0b0">Help</text></g>
    </g>
    <text x="110" y="872" text-anchor="middle" fill="#3a3a5a" font-size="11" font-family="JetBrains Mono, monospace">v0.1.0</text>
  </g>

  <!-- Title row with back button -->
  <g transform="translate(236,36)">
    <rect width="80" height="32" rx="4" fill="transparent" stroke="#3a3a5a"/>
    <text x="40" y="21" text-anchor="middle" fill="#dcdcdc" font-size="13">← Back</text>
  </g>
  <text x="328" y="58" fill="#dcdcdc" font-size="20" font-weight="700">In-Game Name</text>

  <!-- Form card -->
  <g transform="translate(236,100)">
    <rect width="800" height="260" rx="8" fill="#1a1a2e"/>

    <!-- Description -->
    <g transform="translate(24,32)">
      <text fill="#a0a0b0" font-size="13">Set your CS2 in-game name. This is used to identify your stats</text>
      <text y="20" fill="#a0a0b0" font-size="13">in demo files and match history.</text>
    </g>

    <!-- Input field -->
    <g transform="translate(24,90)">
      <rect width="600" height="40" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="14" y="26" fill="#dcdcdc" font-size="14" font-family="JetBrains Mono, monospace">macena</text>
    </g>

    <!-- Helper text -->
    <text x="24" y="150" fill="#5a5a8a" font-size="11">Must match the name shown in demo files (case-sensitive).</text>

    <!-- Save button -->
    <g transform="translate(24,170)">
      <rect width="120" height="36" rx="4" fill="#d96600"/>
      <text x="60" y="23" text-anchor="middle" fill="#14141e" font-size="13" font-weight="700">Save</text>
    </g>

    <!-- Saved confirmation -->
    <g transform="translate(160,170)">
      <rect width="100" height="36" rx="4" fill="rgba(76,175,80,0.15)" stroke="#4caf50"/>
      <text x="50" y="23" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="700">✓ Saved</text>
    </g>
  </g>

  <!-- PlayerProfile lookup card (right) -->
  <g transform="translate(1056,100)">
    <rect width="368" height="260" rx="8" fill="#1a1a2e"/>
    <text x="16" y="28" fill="#dcdcdc" font-size="14" font-weight="700">Database record</text>
    <text x="16" y="48" fill="#a0a0b0" font-size="12">PlayerProfile row auto-created on save.</text>

    <g transform="translate(16,76)" font-size="11" font-family="JetBrains Mono, monospace">
      <text fill="#3a3a5a">SELECT * FROM PlayerProfile</text>
      <text y="16" fill="#3a3a5a">WHERE player_name = "macena"</text>
    </g>

    <g transform="translate(16,122)" font-size="12">
      <text fill="#a0a0b0">id</text>
      <text x="140" fill="#dcdcdc" font-family="JetBrains Mono, monospace">42</text>
    </g>
    <g transform="translate(16,142)" font-size="12">
      <text fill="#a0a0b0">player_name</text>
      <text x="140" fill="#dcdcdc" font-family="JetBrains Mono, monospace">macena</text>
    </g>
    <g transform="translate(16,162)" font-size="12">
      <text fill="#a0a0b0">created_at</text>
      <text x="140" fill="#dcdcdc" font-family="JetBrains Mono, monospace">2025-11-12</text>
    </g>
    <g transform="translate(16,182)" font-size="12">
      <text fill="#a0a0b0">matches_analyzed</text>
      <text x="140" fill="#4caf50" font-family="JetBrains Mono, monospace" font-weight="700">47</text>
    </g>
    <g transform="translate(16,202)" font-size="12">
      <text fill="#a0a0b0">last_match</text>
      <text x="140" fill="#dcdcdc" font-family="JetBrains Mono, monospace">2026-04-22</text>
    </g>
  </g>

  <!-- Related quick actions -->
  <g transform="translate(236,384)">
    <rect width="1188" height="120" rx="8" fill="#1a1a2e"/>
    <text x="16" y="28" fill="#dcdcdc" font-size="14" font-weight="700">Related</text>

    <g transform="translate(16,52)">
      <g>
        <rect width="280" height="56" rx="6" fill="#0f0f2e"/>
        <text x="14" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Steam Config →</text>
        <text x="14" y="40" fill="#a0a0b0" font-size="11">Link SteamID64 and Steam API key</text>
      </g>
      <g transform="translate(292,0)">
        <rect width="280" height="56" rx="6" fill="#0f0f2e"/>
        <text x="14" y="22" fill="#dcdcdc" font-size="13" font-weight="700">FaceIt Config →</text>
        <text x="14" y="40" fill="#a0a0b0" font-size="11">Connect FACEIT API token + ELO sync</text>
      </g>
      <g transform="translate(584,0)">
        <rect width="280" height="56" rx="6" fill="#0f0f2e"/>
        <text x="14" y="22" fill="#dcdcdc" font-size="13" font-weight="700">Match History →</text>
        <text x="14" y="40" fill="#a0a0b0" font-size="11">See every match analyzed under this name</text>
      </g>
    </g>
  </g>

  <!-- Security note -->
  <g transform="translate(236,524)">
    <rect width="1188" height="68" rx="6" fill="rgba(74,158,255,0.08)" stroke="#4a9eff" stroke-dasharray="5 3"/>
    <text x="16" y="26" fill="#4a9eff" font-size="12" font-weight="700">Stored locally</text>
    <text x="16" y="46" fill="#a0a0b0" font-size="12">CS2_PLAYER_NAME lives in user_settings.json (chmod 0o600). Nothing uploaded anywhere. FE-04.</text>
  </g>

  <text x="236" y="870" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">profile_screen.py · save_user_setting("CS2_PLAYER_NAME", ...) · PlayerProfile insert on first save</text>
</svg>
