            <text x="14" y="20" fill="#dcdcdc" font-weight="700">→ AI Coach</text>
            <text x="14" y="36" fill="#a0a0b0" font-size="11">Enable Ollama chat</text>
          </g>
          <g transform="translate(548,0)">
            <rect width="260" height="44" rx="6" fill="#0f0f2e"/>
            <text x="14" y="20" fill="#dcdcdc" font-weight="700">→ Troubleshooting</text>
            <text x="14" y="36" fill="#a0a0b0" font-size="11">Common issues</text>
          </g>
        </g>
