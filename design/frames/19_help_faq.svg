        <rect width="808" height="90" rx="6" fill="#0f0f2e"/>
        <text x="16" y="24" fill="#ffaa00" font-size="11" letter-spacing="2" font-weight="700">DEMO FOLDER · WHERE CS2 SAVES .DEM FILES</text>
        <text x="16" y="46" fill="#a0a0b0" font-size="12">Typical path on Linux / Steam:</text>
        <text x="16" y="66" fill="#dcdcdc" font-size="12" font-family="JetBrains Mono, monospace">~/.steam/steam/steamapps/common/Counter-Strike Global Offensive/game/csgo/replays/</text>
        <text x="16" y="82" fill="#5a5a8a" font-size="10">The analyzer expects .dem files ≥ 10 MB (DS-12 guard).</text>
      </g>

