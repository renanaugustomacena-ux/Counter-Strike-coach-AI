          </g>
          <g transform="translate(0,44)">
            <rect width="808" height="36" rx="4" fill="#0f0f2e"/>
            <text x="14" y="22" fill="#dcdcdc">Return in chat input sends the message · Esc closes dialogs · Back button on drill-down screens returns</text>
          </g>
        </g>
      </g>

      <!-- Bottom help source -->
      <g transform="translate(0,640)">
        <rect width="808" height="54" rx="6" fill="rgba(74,158,255,0.08)" stroke="#4a9eff" stroke-dasharray="4 3"/>
