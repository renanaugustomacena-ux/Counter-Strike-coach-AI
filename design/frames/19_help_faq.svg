  <!-- Right: topic content -->
  <g transform="translate(552,80)">
    <rect width="872" height="800" rx="8" fill="#1a1a2e"/>

    <g transform="translate(32,32)">
      <text fill="#dcdcdc" font-size="20" font-weight="700">Getting Started</text>
      <text y="28" fill="#a0a0b0" font-size="13">Welcome to Macena CS2 Analyzer!</text>

      <!-- Steps -->
      <g transform="translate(0,68)" font-size="13">
        <g>
          <circle cx="12" cy="12" r="12" fill="#d96600"/>
          <text x="12" y="16" text-anchor="middle" fill="#14141e" font-weight="700" font-size="11">1</text>
          <text x="36" y="10" fill="#dcdcdc" font-weight="700">Set your in-game name</text>
          <text x="36" y="28" fill="#a0a0b0">Go to Settings → Quick Links → In-Game Name</text>
        </g>
        <g transform="translate(0,52)">
          <circle cx="12" cy="12" r="12" fill="#d96600"/>
          <text x="12" y="16" text-anchor="middle" fill="#14141e" font-weight="700" font-size="11">2</text>
          <text x="36" y="10" fill="#dcdcdc" font-weight="700">Point to your demo folder</text>
          <text x="36" y="28" fill="#a0a0b0">Home → Demo Analysis → Select Demo Folder</text>
        </g>
        <g transform="translate(0,104)">
          <circle cx="12" cy="12" r="12" fill="#d96600"/>
          <text x="12" y="16" text-anchor="middle" fill="#14141e" font-weight="700" font-size="11">3</text>
          <text x="36" y="10" fill="#dcdcdc" font-weight="700">Let the analyzer ingest your .dem files</text>
          <text x="36" y="28" fill="#a0a0b0">Click "Analyze Demos" — or leave the Scanner daemon running</text>
        </g>
        <g transform="translate(0,156)">
          <circle cx="12" cy="12" r="12" fill="#d96600"/>
          <text x="12" y="16" text-anchor="middle" fill="#14141e" font-weight="700" font-size="11">4</text>
          <text x="36" y="10" fill="#dcdcdc" font-weight="700">Explore Match History and Performance</text>
          <text x="36" y="28" fill="#a0a0b0">Your stats, per-map breakdown, strengths &amp; weaknesses</text>
        </g>
        <g transform="translate(0,208)">
