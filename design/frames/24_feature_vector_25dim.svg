<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Roboto, Inter, system-ui, sans-serif">
  <rect width="1440" height="900" fill="#14141e"/>

  <g transform="translate(60,44)">
    <text fill="#ffaa00" font-size="10" letter-spacing="4" font-weight="700">DATA · FRAME 24</text>
    <text y="32" fill="#dcdcdc" font-size="24" font-weight="700">Feature Vector — all 25 dims, color-coded by group</text>
    <text y="54" fill="#a0a0b0" font-size="12">The contract between ingestion and the model. Changing this invalidates all checkpoints.</text>
    <text y="74" fill="#3a3a5a" font-size="11" font-family="JetBrains Mono, monospace">vectorizer.py:151 FEATURE_NAMES  ·  METADATA_DIM = 25  ·  P-X-01 asserted at import</text>
  </g>

  <!-- 5 groups in 5 colored sections, each with N boxes -->

  <!-- GROUP 1: VITALS (5 dims) — orange #d96600 -->
  <g transform="translate(60,148)">
    <rect width="40" height="560" rx="4" fill="rgba(217,102,0,0.15)"/>
    <text x="20" y="300" text-anchor="middle" fill="#d96600" font-size="11" letter-spacing="4" font-weight="700" transform="rotate(-90 20 300)">VITALS  [0–4]</text>
  </g>

  <g transform="translate(108,148)" font-size="12">
    <!-- 5 feature cards, 208×108 each, 8px gap vertically -->
    <g>
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"/>
      <text x="12" y="22" fill="#d96600" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [0]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">health</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">player HP, 0-100</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">norm: / 100</text>
      <text x="12" y="102" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">range: [0.0, 1.0]</text>
    </g>
    <g transform="translate(0,116)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"/>
      <text x="12" y="22" fill="#d96600" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [1]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">armor</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">armor value, 0-100</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">norm: / 100</text>
      <text x="12" y="102" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">range: [0.0, 1.0]</text>
    </g>
    <g transform="translate(0,232)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"/>
      <text x="12" y="22" fill="#d96600" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [2]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">has_helmet</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">binary flag</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">encoding: 0 / 1</text>
      <text x="12" y="102" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">indexed (D-4)</text>
    </g>
    <g transform="translate(0,348)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"/>
      <text x="12" y="22" fill="#d96600" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [3]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">has_defuser</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">CT kit present</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">encoding: 0 / 1</text>
      <text x="12" y="102" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">indexed (D-4)</text>
    </g>
    <g transform="translate(0,464)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#d96600" stroke-width="1.5"/>
      <text x="12" y="22" fill="#d96600" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [4]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">equipment_value</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">dollar value held</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">norm: / 16000</text>
      <text x="12" y="102" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">range: [0.0, 1.0]</text>
    </g>
  </g>

  <!-- GROUP 2: STATE [5-8] — blue -->
  <g transform="translate(332,148)">
    <rect width="40" height="560" rx="4" fill="rgba(74,158,255,0.15)"/>
    <text x="20" y="300" text-anchor="middle" fill="#4a9eff" font-size="11" letter-spacing="4" font-weight="700" transform="rotate(-90 20 300)">STATE  [5–8]</text>
  </g>
  <g transform="translate(380,148)" font-size="12">
    <g>
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4a9eff" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [5]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">is_crouching</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">binary · posture</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">encoding: 0 / 1</text>
    </g>
    <g transform="translate(0,116)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4a9eff" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [6]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">is_scoped</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">AWP / SSG scope</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">encoding: 0 / 1</text>
    </g>
    <g transform="translate(0,232)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4a9eff" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [7]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">is_blinded</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">flash active</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">encoding: 0 / 1</text>
    </g>
    <g transform="translate(0,348)">
      <rect width="208" height="108" rx="6" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4a9eff" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [8]</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="15" font-weight="700">enemies_visible</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">count, clamped</text>
      <text x="12" y="88" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">norm: / 5, clamp[0,1]</text>
    </g>
    <!-- Empty slot (visual filler) -->
    <g transform="translate(0,464)">
      <rect width="208" height="108" rx="6" fill="#0f0f2e" stroke="#3a3a5a" stroke-dasharray="4 3"/>
      <text x="104" y="60" text-anchor="middle" fill="#3a3a5a" font-size="11">—</text>
    </g>
  </g>

  <!-- GROUP 3: SPATIAL [9-15] — green -->
  <g transform="translate(604,148)">
    <rect width="40" height="560" rx="4" fill="rgba(76,175,80,0.15)"/>
    <text x="20" y="280" text-anchor="middle" fill="#4caf50" font-size="11" letter-spacing="4" font-weight="700" transform="rotate(-90 20 280)">SPATIAL  [9–15]</text>
  </g>
  <g transform="translate(652,148)" font-size="12">
    <g>
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [9]  pos_x</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">horizontal X</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">/ ±pos_xy_extent (map-specific)</text>
    </g>
    <g transform="translate(0,82)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [10]  pos_y</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">horizontal Y</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">/ ±pos_xy_extent</text>
    </g>
    <g transform="translate(0,164)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [11]  pos_z</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">vertical Z (heights)</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">/ pos_z_extent · Nuke/Vertigo</text>
    </g>
    <g transform="translate(0,246)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [12]  view_yaw_sin</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">sin(yaw angle)</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">cyclic continuity (no 360→0 jump)</text>
    </g>
    <g transform="translate(0,328)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [13]  view_yaw_cos</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">cos(yaw angle)</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">pairs with sin for direction</text>
    </g>
    <g transform="translate(0,410)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [14]  view_pitch</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">vertical look angle</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">/ pitch_max (±89°)</text>
    </g>
    <g transform="translate(0,492)">
      <rect width="208" height="76" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
      <text x="12" y="22" fill="#4caf50" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [15]  z_penalty</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">vertical distinctiveness</text>
      <text x="12" y="64" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">0–1 · weighted 2× in RAP (NN-TR-02b)</text>
    </g>
  </g>

  <!-- GROUP 4: CONTEXT [16-18] — purple -->
  <g transform="translate(876,148)">
    <rect width="40" height="560" rx="4" fill="rgba(168,85,247,0.15)"/>
    <text x="20" y="260" text-anchor="middle" fill="#a855f7" font-size="11" letter-spacing="4" font-weight="700" transform="rotate(-90 20 260)">CONTEXT  [16–18]</text>
  </g>
  <g transform="translate(924,148)" font-size="12">
    <g>
      <rect width="208" height="176" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
      <text x="12" y="22" fill="#a855f7" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [16]  kast_estimate</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="14" font-weight="700">KAST participation</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">Kill / Assist / Survived / Traded</text>
      <text x="12" y="86" fill="#a0a0b0" font-size="11">rolling estimate, 0–1 ratio</text>
      <text x="12" y="108" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">range: [0.0, 1.0]</text>
      <text x="12" y="126" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">Updated via RoundStats</text>
      <text x="12" y="158" fill="#5a5a8a" font-size="10">per-player, pre-computed</text>
    </g>
    <g transform="translate(0,184)">
      <rect width="208" height="176" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
      <text x="12" y="22" fill="#a855f7" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [17]  map_id</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="14" font-weight="700">map identifier</text>
      <text x="12" y="68" fill="#a0a0b0" font-size="11">deterministic MD5 hash</text>
      <text x="12" y="86" fill="#a0a0b0" font-size="11">truncated + normalized → 0–1</text>
      <text x="12" y="108" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">9 maps: mirage, inferno,</text>
      <text x="12" y="122" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">  dust2, nuke, overpass,</text>
      <text x="12" y="136" fill="#3a3a5a" font-size="10" font-family="JetBrains Mono, monospace">  ancient, anubis, vertigo, train</text>
      <text x="12" y="158" fill="#5a5a8a" font-size="10">uses hashlib.md5 (not Python hash)</text>
    </g>
    <g transform="translate(0,368)">
      <rect width="208" height="176" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
      <text x="12" y="22" fill="#a855f7" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [18]  round_phase</text>
      <text x="12" y="46" fill="#dcdcdc" font-size="14" font-weight="700">economic phase</text>
      <text x="12" y="70" fill="#a0a0b0" font-size="11">0.00 · pistol round</text>
      <text x="12" y="86" fill="#a0a0b0" font-size="11">0.33 · eco / save</text>
      <text x="12" y="102" fill="#a0a0b0" font-size="11">0.66 · force buy</text>
      <text x="12" y="118" fill="#a0a0b0" font-size="11">1.00 · full buy</text>
      <text x="12" y="158" fill="#5a5a8a" font-size="10">quantized bucket</text>
    </g>
  </g>

  <!-- GROUP 5: TACTICAL [19-24] — amber -->
  <g transform="translate(1148,148)">
    <rect width="40" height="560" rx="4" fill="rgba(255,170,0,0.15)"/>
    <text x="20" y="280" text-anchor="middle" fill="#ffaa00" font-size="11" letter-spacing="4" font-weight="700" transform="rotate(-90 20 280)">TACTICAL  [19–24]</text>
  </g>
  <g transform="translate(1196,148)" font-size="12">
    <g>
      <rect width="208" height="88" rx="6" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [19]  weapon_class</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">weapon category</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">knife 0 · pistol 0.2 · SMG 0.4</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">rifle 0.6 · AWP 0.8 · heavy 1.0</text>
    </g>
    <g transform="translate(0,96)">
      <rect width="208" height="88" rx="6" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [20]  time_in_round</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">seconds elapsed</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">/ 115 · clamped [0, 1]</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">standard round = 1:55 total</text>
    </g>
    <g transform="translate(0,192)">
      <rect width="208" height="88" rx="6" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [21]  bomb_planted</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">C4 state</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">binary 0 / 1</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">post-plant phase marker</text>
    </g>
    <g transform="translate(0,288)">
      <rect width="208" height="88" rx="6" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [22]  teammates_alive</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">allies still in</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">count / 4 · [0, 1]</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">self excluded</text>
    </g>
    <g transform="translate(0,384)">
      <rect width="208" height="88" rx="6" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [23]  enemies_alive</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">opponents still in</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">count / 5 · [0, 1]</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">drives clutch logic</text>
    </g>
    <g transform="translate(0,480)">
      <rect width="208" height="88" rx="6" fill="rgba(255,170,0,0.12)" stroke="#ffaa00" stroke-width="2"/>
      <text x="12" y="22" fill="#ffaa00" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace">dim [24]  team_economy</text>
      <text x="12" y="44" fill="#dcdcdc" font-size="13" font-weight="700">team avg money</text>
      <text x="12" y="62" fill="#a0a0b0" font-size="11">/ 16000 · clamp [0, 1]</text>
      <text x="12" y="78" fill="#a0a0b0" font-size="11">FINAL DIM · last in tuple</text>
    </g>
  </g>

  <!-- Footer: contract note -->
  <g transform="translate(60,740)">
    <rect width="1344" height="132" rx="8" fill="rgba(255,68,68,0.05)" stroke="#ff4444" stroke-dasharray="5 3"/>
    <text x="16" y="26" fill="#ff4444" font-size="11" letter-spacing="3" font-weight="700">CONTRACT — DO NOT MODIFY WITHOUT UPDATING EVERYWHERE</text>
    <g transform="translate(16,44)" font-size="12">
      <text fill="#a0a0b0"><tspan fill="#ffaa00" font-weight="700">If you change the feature order:</tspan>  all existing model checkpoints become garbage. PlayerTickState rows reindex silently.</text>
      <text y="20" fill="#a0a0b0"><tspan fill="#ffaa00" font-weight="700">If you add/remove a dim:</tspan>  update <tspan font-family="JetBrains Mono, monospace" fill="#dcdcdc">METADATA_DIM</tspan> AND <tspan font-family="JetBrains Mono, monospace" fill="#dcdcdc">FEATURE_NAMES</tspan> AND the model's <tspan font-family="JetBrains Mono, monospace" fill="#dcdcdc">input_dim</tspan>. The import assert catches mismatches.</text>
      <text y="40" fill="#a0a0b0"><tspan fill="#ffaa00" font-weight="700">round_won is BANNED:</tspan>  P-RSB-03 · using the label as a feature causes label leak → model memorizes instead of learning.</text>
      <text y="60" fill="#a0a0b0"><tspan fill="#ffaa00" font-weight="700">NaN / Inf handling:</tspan>  P-VEC-02 · clamp to 0 at extraction. If &gt;5% of a batch is clamped → raise DataQualityError.</text>
    </g>
  </g>
</svg>
