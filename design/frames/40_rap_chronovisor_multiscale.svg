<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <rect width="1440" height="900" fill="#0b0b14"/>

  <defs>
    <marker id="a40" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#d96600"/>
    </marker>
    <marker id="a40g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4db04f"/>
    </marker>
    <marker id="a40r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ff4444"/>
    </marker>
  </defs>

  <text x="60" y="50" fill="#dcdcdc" font-size="24" font-weight="700">RAP · Chronovisor — multi-scale critical-moment scanner</text>
  <text x="60" y="74" fill="#a0a0b0" font-size="13">backend/nn/experimental/rap_coach/chronovisor_scanner.py · post-inference on value_estimate timeline</text>
  <text x="60" y="94" fill="#3a3a5a" font-size="11" font-family="'JetBrains Mono', monospace">ANALYSIS_SCALES = [micro 64t · standard 192t · macro 640t] · cross-scale dedup MIN_GAP_TICKS=64</text>

  <!-- ═══ Timeline (top) ═══ -->
  <g transform="translate(60 118)">
    <text fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">V(s) TIMELINE · vals[] from model.forward()["value_estimate"]</text>

    <g transform="translate(0 18)">
      <rect width="1320" height="160" rx="10" fill="#1a1a2e" stroke="#3a3a5a"/>

      <!-- axes -->
      <rect x="40" y="20" width="1260" height="120" fill="#14141e"/>
      <g stroke="rgba(255,255,255,0.08)" stroke-width="0.5">
        <line x1="40" y1="50" x2="1300" y2="50"/>
        <line x1="40" y1="80" x2="1300" y2="80" stroke="rgba(255,255,255,0.25)"/>
        <line x1="40" y1="110" x2="1300" y2="110"/>
      </g>
      <text x="34" y="54" fill="#a0a0b0" font-size="9" text-anchor="end">+0.5</text>
      <text x="34" y="84" fill="#a0a0b0" font-size="9" text-anchor="end">0.0</text>
      <text x="34" y="114" fill="#a0a0b0" font-size="9" text-anchor="end">-0.5</text>

      <!-- V(s) line with ripples -->
      <path d="M46 82
               L94 78 L120 86 L150 76 L180 82
               L220 66 L260 58 L290 48 L310 62 L340 72 L380 82
               L420 78 L450 74 L490 80
               L540 86 L580 98 L620 110 L650 118 L680 112 L720 104
               L760 94 L800 88 L840 82
               L890 76 L930 62 L960 50 L1000 58 L1040 72 L1080 82
               L1130 80 L1180 82 L1230 86 L1280 82"
            fill="none" stroke="#00ccff" stroke-width="1.5"/>
      <!-- area -->
      <path d="M46 82
               L94 78 L120 86 L150 76 L180 82
               L220 66 L260 58 L290 48 L310 62 L340 72 L380 82
               L420 78 L450 74 L490 80
               L540 86 L580 98 L620 110 L650 118 L680 112 L720 104
               L760 94 L800 88 L840 82
               L890 76 L930 62 L960 50 L1000 58 L1040 72 L1080 82
               L1130 80 L1180 82 L1230 86 L1280 82
               L1280 140 L46 140 Z"
            fill="rgba(0,204,255,0.1)"/>

      <!-- critical moments -->
      <!-- A: advantage spike up at ~290 (play) -->
      <circle cx="290" cy="48" r="8" fill="rgba(77,176,79,0.22)" stroke="#4db04f" stroke-width="1.5"/>
      <circle cx="290" cy="48" r="3" fill="#4db04f"/>
      <text x="290" y="12" fill="#4db04f" font-size="9" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">PLAY · micro · Δ+0.34</text>
      <line x1="290" y1="14" x2="290" y2="38" stroke="#4db04f" stroke-width="0.6" opacity="0.4"/>

      <!-- B: drop at ~650 (mistake) -->
      <circle cx="650" cy="118" r="10" fill="rgba(255,68,68,0.22)" stroke="#ff4444" stroke-width="1.5"/>
      <circle cx="650" cy="118" r="4" fill="#ff4444"/>
      <text x="650" y="136" fill="#ff4444" font-size="9" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">MISTAKE · standard · Δ−0.42</text>

      <!-- C: slow climb 800→960 (macro play) -->
      <path d="M800 88 L960 50" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 2" fill="none"/>
      <circle cx="960" cy="50" r="8" fill="rgba(255,170,0,0.22)" stroke="#ffaa00" stroke-width="1.5"/>
      <circle cx="960" cy="50" r="3" fill="#ffaa00"/>
      <text x="960" y="12" fill="#ffaa00" font-size="9" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">STRATEGIC · macro · Δ+0.22</text>
      <line x1="960" y1="14" x2="960" y2="40" stroke="#ffaa00" stroke-width="0.6" opacity="0.4"/>

      <!-- x-axis labels -->
      <text x="46" y="152" fill="#a0a0b0" font-size="9">tick 0</text>
      <text x="1280" y="152" fill="#a0a0b0" font-size="9" text-anchor="end">~50,000</text>
    </g>
  </g>

  <!-- ═══ 3 scales side-by-side ═══ -->
  <g transform="translate(60 310)">
    <text fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">ANALYSIS_SCALES · 3 parallel passes</text>

    <!-- MICRO -->
    <g transform="translate(0 18)">
      <rect width="432" height="260" rx="10" fill="#1a1a2e" stroke="#4db04f" stroke-width="1.2"/>
      <rect width="432" height="34" rx="10" fill="#4db04f"/>
      <text x="16" y="22" fill="#ffffff" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">MICRO · engagement tick scale</text>

      <g font-family="'JetBrains Mono', monospace" font-size="11" transform="translate(16 50)">
        <text fill="#3a3a5a">window_ticks</text>
        <text x="400" fill="#dcdcdc" text-anchor="end">64</text>
        <text y="18" fill="#3a3a5a">lag</text>
        <text x="400" y="18" fill="#dcdcdc" text-anchor="end">16</text>
        <text y="36" fill="#3a3a5a">threshold</text>
        <text x="400" y="36" fill="#dcdcdc" text-anchor="end">0.10</text>
        <text y="54" fill="#3a3a5a">priority</text>
        <text x="400" y="54" fill="#4db04f" text-anchor="end">0 (highest)</text>
      </g>
      <text x="16" y="134" fill="#a0a0b0" font-size="11">Sub-second engagement decisions.</text>
      <text x="16" y="152" fill="#a0a0b0" font-size="11">~1 second of game time per window.</text>

      <!-- Mini signal -->
      <g transform="translate(16 166)">
        <rect width="400" height="74" fill="#0a0a14" stroke="#3a3a5a" stroke-width="0.6"/>
        <path d="M10 56 L40 50 L70 44 L100 48 L130 40 L160 30 L180 24 L200 36 L220 44 L260 42 L300 48 L340 54 L380 50"
              fill="none" stroke="#00ccff" stroke-width="1.2"/>
        <circle cx="180" cy="24" r="5" fill="rgba(77,176,79,0.3)" stroke="#4db04f" stroke-width="1.2"/>
        <circle cx="180" cy="24" r="2" fill="#4db04f"/>
        <text x="180" y="16" fill="#4db04f" font-size="9" text-anchor="middle" font-family="'JetBrains Mono', monospace">Δ+0.34</text>
        <text x="10" y="70" fill="#3a3a5a" font-size="9" font-family="'JetBrains Mono', monospace">engagement tick block</text>
      </g>
    </g>

    <!-- STANDARD -->
    <g transform="translate(444 18)">
      <rect width="432" height="260" rx="10" fill="#1a1a2e" stroke="#ffaa00" stroke-width="1.2"/>
      <rect width="432" height="34" rx="10" fill="#ffaa00"/>
      <text x="16" y="22" fill="#14141e" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">STANDARD · round scale</text>

      <g font-family="'JetBrains Mono', monospace" font-size="11" transform="translate(16 50)">
        <text fill="#3a3a5a">window_ticks</text>
        <text x="400" fill="#dcdcdc" text-anchor="end">192</text>
        <text y="18" fill="#3a3a5a">lag</text>
        <text x="400" y="18" fill="#dcdcdc" text-anchor="end">64</text>
        <text y="36" fill="#3a3a5a">threshold</text>
        <text x="400" y="36" fill="#dcdcdc" text-anchor="end">0.15</text>
        <text y="54" fill="#3a3a5a">priority</text>
        <text x="400" y="54" fill="#ffaa00" text-anchor="end">1 (middle)</text>
      </g>
      <text x="16" y="134" fill="#a0a0b0" font-size="11">Engagement-level critical moments.</text>
      <text x="16" y="152" fill="#a0a0b0" font-size="11">~3 seconds per window, round-level focus.</text>

      <g transform="translate(16 166)">
        <rect width="400" height="74" fill="#0a0a14" stroke="#3a3a5a" stroke-width="0.6"/>
        <path d="M10 30 L60 34 L110 40 L160 46 L200 50 L240 62 L260 68 L280 62 L320 56 L360 46 L390 40"
              fill="none" stroke="#00ccff" stroke-width="1.2"/>
        <circle cx="260" cy="68" r="6" fill="rgba(255,68,68,0.3)" stroke="#ff4444" stroke-width="1.2"/>
        <circle cx="260" cy="68" r="2" fill="#ff4444"/>
        <text x="260" y="62" fill="#ff4444" font-size="9" text-anchor="start" font-family="'JetBrains Mono', monospace">Δ−0.42 (3s)</text>
        <text x="10" y="70" fill="#3a3a5a" font-size="9" font-family="'JetBrains Mono', monospace">round sweep</text>
      </g>
    </g>

    <!-- MACRO -->
    <g transform="translate(888 18)">
      <rect width="432" height="260" rx="10" fill="#1a1a2e" stroke="#a0a0b0" stroke-width="1.2"/>
      <rect width="432" height="34" rx="10" fill="#a0a0b0"/>
      <text x="16" y="22" fill="#14141e" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">MACRO · strategic shift scale</text>

      <g font-family="'JetBrains Mono', monospace" font-size="11" transform="translate(16 50)">
        <text fill="#3a3a5a">window_ticks</text>
        <text x="400" fill="#dcdcdc" text-anchor="end">640</text>
        <text y="18" fill="#3a3a5a">lag</text>
        <text x="400" y="18" fill="#dcdcdc" text-anchor="end">128</text>
        <text y="36" fill="#3a3a5a">threshold</text>
        <text x="400" y="36" fill="#dcdcdc" text-anchor="end">0.20</text>
        <text y="54" fill="#3a3a5a">priority</text>
        <text x="400" y="54" fill="#a0a0b0" text-anchor="end">2 (lowest)</text>
      </g>
      <text x="16" y="134" fill="#a0a0b0" font-size="11">Strategic shift detection (5-10 seconds).</text>
      <text x="16" y="152" fill="#a0a0b0" font-size="11">Half/economy transitions, map control flips.</text>

      <g transform="translate(16 166)">
        <rect width="400" height="74" fill="#0a0a14" stroke="#3a3a5a" stroke-width="0.6"/>
        <path d="M10 62 L80 58 L150 52 L220 46 L290 38 L360 26 L390 22"
              fill="none" stroke="#00ccff" stroke-width="1.2"/>
        <circle cx="360" cy="26" r="6" fill="rgba(255,170,0,0.3)" stroke="#ffaa00" stroke-width="1.2"/>
        <circle cx="360" cy="26" r="2" fill="#ffaa00"/>
        <text x="358" y="18" fill="#ffaa00" font-size="9" text-anchor="end" font-family="'JetBrains Mono', monospace">Δ+0.22 (10s climb)</text>
        <text x="10" y="70" fill="#3a3a5a" font-size="9" font-family="'JetBrains Mono', monospace">map-control shift</text>
      </g>
    </g>
  </g>

  <!-- ═══ Cross-scale dedup ═══ -->
  <g transform="translate(60 594)">
    <rect width="840" height="180" rx="10" fill="#1a1a2e" stroke="#3a3a5a"/>
    <text x="16" y="24" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">CROSS-SCALE DEDUPLICATION · _deduplicate_across_scales()</text>
    <text x="16" y="44" fill="#dcdcdc" font-size="12" font-weight="700">When multiple scales detect the same peak within 64 ticks, keep the finer-grained one.</text>

    <!-- Example conflict -->
    <g transform="translate(16 62)">
      <text fill="#a0a0b0" font-size="11" font-weight="700">Conflict example · peak_tick ≈ 23,400</text>

      <!-- 3 detections -->
      <g transform="translate(0 18)">
        <rect width="260" height="30" rx="4" fill="#0f0f2e" stroke="#4db04f" stroke-width="1.2"/>
        <text x="10" y="20" fill="#4db04f" font-size="10" font-weight="700" font-family="'JetBrains Mono', monospace">MICRO · peak 23,384 · sev 0.31</text>
        <text x="254" y="20" fill="#4db04f" font-size="12" font-weight="700" text-anchor="end">✓ KEEP</text>
      </g>
      <g transform="translate(270 18)">
        <rect width="260" height="30" rx="4" fill="#0f0f2e" stroke="#ffaa00" stroke-width="1"/>
        <text x="10" y="20" fill="#ffaa00" font-size="10" font-weight="700" font-family="'JetBrains Mono', monospace">STANDARD · peak 23,420 · sev 0.28</text>
        <text x="254" y="20" fill="#ff4444" font-size="12" font-weight="700" text-anchor="end">✗ DROP</text>
      </g>
      <g transform="translate(540 18)">
        <rect width="260" height="30" rx="4" fill="#0f0f2e" stroke="#a0a0b0" stroke-width="1"/>
        <text x="10" y="20" fill="#a0a0b0" font-size="10" font-weight="700" font-family="'JetBrains Mono', monospace">MACRO · peak 23,440 · sev 0.22</text>
        <text x="254" y="20" fill="#ff4444" font-size="12" font-weight="700" text-anchor="end">✗ DROP</text>
      </g>

      <text x="0" y="66" fill="#a0a0b0" font-size="11">▸ scale_priority = {micro:0, standard:1, macro:2} · lower = finer = preferred</text>
      <text x="0" y="84" fill="#a0a0b0" font-size="11">▸ Same scale + overlap → higher severity wins</text>
      <text x="0" y="102" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace">chronovisor_scanner.py:372</text>
    </g>
  </g>

  <!-- ═══ CriticalMoment output ═══ -->
  <g transform="translate(920 594)">
    <rect width="460" height="180" rx="10" fill="#1a1a2e" stroke="#3a3a5a"/>
    <text x="16" y="24" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">CRITICALMOMENT · dataclass output</text>

    <g transform="translate(16 36)">
      <rect width="428" height="130" rx="6" fill="#0a0a14" stroke="#ff4444" stroke-width="1.2"/>
      <g font-family="'JetBrains Mono', monospace" font-size="11">
        <text x="12" y="22" fill="#ff4444">CriticalMoment(</text>
        <text x="20" y="38" fill="#dcdcdc">match_id=<tspan fill="#ffaa00">2374201</tspan>,</text>
        <text x="20" y="54" fill="#dcdcdc">peak_tick=<tspan fill="#ffaa00">23384</tspan>,</text>
        <text x="20" y="70" fill="#dcdcdc">severity=<tspan fill="#ff4444">0.42</tspan>,  <tspan fill="#3a3a5a"># &gt;0.3 → critical</tspan></text>
        <text x="20" y="86" fill="#dcdcdc">type=<tspan fill="#4db04f">"mistake"</tspan>,</text>
        <text x="20" y="102" fill="#dcdcdc">scale=<tspan fill="#4db04f">"standard"</tspan>,</text>
        <text x="20" y="118" fill="#dcdcdc">context_ticks=<tspan fill="#ffaa00">128</tspan>)</text>
      </g>
    </g>
  </g>

  <!-- ═══ Pipeline footer ═══ -->
  <g transform="translate(60 792)">
    <rect width="1320" height="70" rx="10" fill="#1a1a2e" stroke="#3a3a5a"/>
    <text x="16" y="24" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">SCAN PIPELINE</text>

    <g transform="translate(16 38)">
      <rect width="160" height="24" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="80" y="16" fill="#dcdcdc" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">1. fetch ticks ≤50K</text>
    </g>
    <line x1="180" y1="50" x2="200" y2="50" stroke="#d96600" stroke-width="1.5" marker-end="url(#a40)"/>

    <g transform="translate(204 38)">
      <rect width="180" height="24" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="90" y="16" fill="#dcdcdc" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">2. reconstruct windows</text>
    </g>
    <line x1="388" y1="50" x2="408" y2="50" stroke="#d96600" stroke-width="1.5" marker-end="url(#a40)"/>

    <g transform="translate(412 38)">
      <rect width="200" height="24" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="100" y="16" fill="#dcdcdc" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">3. model(batch) V(s)</text>
    </g>
    <line x1="616" y1="50" x2="636" y2="50" stroke="#d96600" stroke-width="1.5" marker-end="url(#a40)"/>

    <g transform="translate(640 38)">
      <rect width="200" height="24" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="100" y="16" fill="#dcdcdc" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">4. _analyze × 3 scales</text>
    </g>
    <line x1="844" y1="50" x2="864" y2="50" stroke="#d96600" stroke-width="1.5" marker-end="url(#a40)"/>

    <g transform="translate(868 38)">
      <rect width="180" height="24" rx="4" fill="#0f0f2e" stroke="#3a3a5a"/>
      <text x="90" y="16" fill="#dcdcdc" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">5. cross-scale dedup</text>
    </g>
    <line x1="1052" y1="50" x2="1072" y2="50" stroke="#d96600" stroke-width="1.5" marker-end="url(#a40)"/>

    <g transform="translate(1076 38)">
      <rect width="232" height="24" rx="4" fill="#0f0f2e" stroke="#d96600" stroke-width="1.2"/>
      <text x="116" y="16" fill="#d96600" font-size="10" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">6. ScanResult → UI</text>
    </g>
  </g>

  <text x="60" y="878" fill="#3a3a5a" font-size="10" font-family="'JetBrains Mono', monospace">NN-CV-01 model load errors include cause · NN-CV-02 truncation &gt;50K · NN-CV-03 peak_idx bounds check</text>
</svg>
