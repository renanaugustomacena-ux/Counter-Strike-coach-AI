      <text x="10" y="18" fill="#dcdcdc" font-size="11" font-weight="700">Utility burn before engage</text>
      <text x="540" y="18" text-anchor="end" fill="#ffcc00" font-size="10" font-weight="700">Medium</text>
    </g>
    <g transform="translate(16,106)">
      <rect width="550" height="26" rx="4" fill="#181c28"/>
      <text x="10" y="18" fill="#dcdcdc" font-size="11" font-weight="700">Crosshair placement improving</text>
      <text x="540" y="18" text-anchor="end" fill="#4caf50" font-size="10" font-weight="700">Low</text>
    </g>
  </g>

  <!-- Advanced Analytics (compact placeholder) -->
  <g transform="translate(236,236)">
    <rect width="1188" height="224" rx="8" fill="#1a1a2e"/>
    <text x="16" y="28" fill="#dcdcdc" font-size="14" font-weight="700">Advanced Analytics</text>
    <text x="594" y="118" text-anchor="middle" fill="#666680" font-size="13">Trend graphs and radar charts will appear here after demo analysis.</text>
    <text x="594" y="138" text-anchor="middle" fill="#666680" font-size="13">Analyze matches to populate this section.</text>
  </g>

