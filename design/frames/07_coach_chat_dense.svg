      <text x="46" y="22" fill="#4caf50" font-size="14">●</text>
      <text x="62" y="22" fill="#a0a0b0" font-size="12">Online</text>
      <text x="130" y="22" fill="#3a3a5a" font-size="11" font-family="JetBrains Mono, monospace">ollama · gemma3:e2b</text>

