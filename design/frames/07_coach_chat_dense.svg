      <circle cx="40" cy="40" r="36" fill="none" stroke="#d96600" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="165.12 61.07" transform="rotate(-90 40 40) scale(1 -1) translate(0 -80)"/>
      <text x="40" y="46" text-anchor="middle" fill="#dcdcdc" font-size="16" font-weight="700">73%</text>
    </g>
    <g transform="translate(124,72)" font-size="12">
