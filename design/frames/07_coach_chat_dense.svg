      <text x="10" y="18" fill="#dcdcdc" font-size="11" font-weight="700">Over-peeking A-site default</text>
      <text x="540" y="18" text-anchor="end" fill="#ff5555" font-size="10" font-weight="700">High</text>
    </g>
    <g transform="translate(16,74)">
