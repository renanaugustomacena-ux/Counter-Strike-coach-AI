        <text x="12" y="40" fill="#dcdcdc" font-size="13">Main pattern: over-peeking A-site jungle without util.</text>
      </g>

      <!-- User message 1 (right, bg #1a3366) -->
      <g transform="translate(696,64)">
        <rect width="500" height="36" rx="10" fill="#1a3366"/>
        <text x="12" y="22" fill="#dcdcdc" font-size="13">How can I improve positioning?</text>
      </g>

      <!-- Assistant message 2 -->
      <g transform="translate(0,112)">
        <rect width="680" height="64" rx="10" fill="#181c28"/>
        <text x="12" y="20" fill="#dcdcdc" font-size="13">Three patterns from your data vs ZywOo pro reference:</text>
        <text x="12" y="38" fill="#a0a0b0" font-size="12">① Hold jungle angle from stairs, not top · ② Delay peek 0.4s after flash · ③ Crouch-peek when HP &lt; 60</text>
        <text x="12" y="54" fill="#5a5a8a" font-size="11" font-family="JetBrains Mono, monospace">confidence 0.82 · 4 demos referenced · RAP-Pedagogy</text>
      </g>

      <!-- User message 2 -->
      <g transform="translate(840,188)">
        <rect width="356" height="36" rx="10" fill="#1a3366"/>
        <text x="12" y="22" fill="#dcdcdc" font-size="13">Analyze utility usage</text>
      </g>

      <!-- Assistant message 3 -->
      <g transform="translate(0,236)">
        <rect width="760" height="36" rx="10" fill="#181c28"/>
        <text x="12" y="22" fill="#dcdcdc" font-size="13">Your HE avg 4.1s before engage vs pro 8.3s — throw earlier on execute plays.</text>
      </g>
    </g>


    <!-- Quick action chips row (h=28) -->
    <g transform="translate(12,328)" font-size="12">
      <g>
        <rect width="190" height="24" rx="12" fill="transparent" stroke="#3a3a5a"/>
        <text x="95" y="16" text-anchor="middle" fill="#a0a0b0">How can I improve positioning?</text>
      </g>
      <g transform="translate(198,0)">
        <rect width="150" height="24" rx="12" fill="transparent" stroke="#3a3a5a"/>
        <text x="75" y="16" text-anchor="middle" fill="#a0a0b0">Analyze utility usage</text>
      </g>
      <g transform="translate(356,0)">
        <rect width="220" height="24" rx="12" fill="transparent" stroke="#3a3a5a"/>
        <text x="110" y="16" text-anchor="middle" fill="#a0a0b0">What should I focus on improving?</text>
      </g>
    </g>

    <!-- Input row (y=364) -->
    <g transform="translate(12,364)">
      <rect width="1118" height="36" rx="4" fill="#1a1a2e"/>
      <text x="12" y="22" fill="#666680" font-size="13">Ask your coach...</text>
      <g transform="translate(1126,0)">
        <rect width="70" height="36" rx="4" fill="#d96600"/>
