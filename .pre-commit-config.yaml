# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# Install: pip install pre-commit && pre-commit install

repos:
  # Local hooks for project-specific checks
  - repo: local
    hooks:
      - id: headless-validator
        name: Headless System Validator
        entry: python tools/headless_validator.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [commit]
        description: "Run headless validation suite before commit"

      # Dead Code & Orphan Detector
      - id: dead-code-detector
        name: Dead Code & Orphan Detector
        entry: python tools/dead_code_detector.py
        language: system
        pass_filenames: false
        types: [python]
        stages: [commit]
        description: "Scans for orphaned modules and unused code"

      # Integrity manifest sync check
      - id: integrity-manifest-check
        name: Check Integrity Manifest
        entry: python Programma_CS2_RENAN/tools/sync_integrity_manifest.py --verify-only
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
        description: "Verify that integrity_manifest.json is up-to-date with critical files"

      # Build health validation
      - id: dev-health-quick
        name: Development Health Check
        entry: python tools/dev_health.py --quick
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
        description: "Run critical health checks (fast)"

  # Standard code quality hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: |
          (?x)^(
            Programma_CS2_RENAN/PHOTO_GUI/.*\.(jpg|jpeg|png|bmp|gif|ico)|
            Programma_CS2_RENAN/data/external/.*\.csv
          )$
      - id: check-merge-conflict
      - id: detect-private-key

  # Python-specific hooks
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.10
        args: ['--line-length=100']
        exclude: |
          (?x)^(
            external_analysis/.*|
            dist/.*|
            venv.*/.*
          )$

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']
        exclude: |
          (?x)^(
            external_analysis/.*|
            dist/.*|
            venv.*/.*
          )$

# Configuration for specific file types
default_language_version:
  python: python3.10
